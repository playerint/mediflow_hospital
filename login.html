<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>로그인 — MEDIFLOW</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Pretendard Variable',-apple-system,'Apple SD Gothic Neo',sans-serif;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;
  background:var(--navy);
  -webkit-font-smoothing:antialiased;
}
:root{
  --navy:#0D1B3E;
  --navy-h:#162952;
  --navy-l:#EEF2FF;
  --blue:#2563EB;
  --blue-l:#EFF6FF;
  --red:#DC2626;
  --red-l:#FEF2F2;
  --green:#16A34A;
  --s0:#FFFFFF;
  --s50:#F9FAFB;
  --s100:#F3F4F6;
  --s200:#E5E7EB;
  --s300:#D1D5DB;
  --s400:#9CA3AF;
  --s500:#6B7280;
  --s700:#374151;
  --s900:#111827;
}

/* 배경 */
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(circle at 15% 25%, rgba(37,99,235,.07) 0%, transparent 50%),
    radial-gradient(circle at 85% 75%, rgba(37,99,235,.05) 0%, transparent 50%);
  pointer-events:none;
}

.wrap{width:100%;max-width:400px;padding:20px;position:relative;z-index:1;}

/* 카드 */
.card{
  background:#fff;
  border-radius:16px;
  padding:40px 36px;
  box-shadow:0 20px 60px rgba(0,0,0,.3);
}

/* 로고 */
.logo{text-align:center;margin-bottom:28px;}
.logo-mark{
  width:44px;height:44px;
  background:var(--navy);
  border-radius:10px;
  display:inline-flex;align-items:center;justify-content:center;
  margin-bottom:12px;
}
.logo-mark svg{width:22px;height:22px;}
.logo-title{font-size:14px;font-weight:800;color:var(--navy);letter-spacing:.04em;}
.logo-sub{font-size:10px;color:var(--s400);margin-top:3px;letter-spacing:.08em;text-transform:uppercase;}

/* 병원 배지 — teal→navy border */
.hospital-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--navy-l);
  border:1px solid rgba(37,99,235,.25);
  border-radius:8px;padding:5px 12px;
  font-size:12px;color:var(--navy);font-weight:600;margin-top:8px;
}

.title{font-size:18px;font-weight:700;color:var(--navy);margin-bottom:4px;margin-top:20px;}
.sub{font-size:13px;color:var(--s500);margin-bottom:22px;}

/* 폼 */
.f-label{font-size:12px;font-weight:600;color:var(--s700);margin-bottom:5px;display:block;}
.f-input{
  width:100%;padding:10px 14px;
  border:1.5px solid var(--s200);
  border-radius:10px;font-size:14px;
  font-family:inherit;outline:none;
  color:var(--s900);transition:border .15s;
  margin-bottom:12px;display:block;
}
.f-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.08);}

/* 로그인 버튼 → navy */
.login-btn{
  width:100%;padding:12px;
  background:var(--navy);
  color:#fff;border:none;border-radius:10px;
  font-size:14px;font-weight:700;
  font-family:inherit;cursor:pointer;
  transition:background .15s;
}
.login-btn:hover{background:var(--navy-h);}

/* 에러 */
.error{
  font-size:12px;color:var(--red);
  background:var(--red-l);
  border:1px solid #FCA5A5;
  border-radius:8px;padding:8px 12px;
  margin-bottom:12px;display:none;
}

/* 데모 */
.demo{margin-top:20px;padding-top:16px;border-top:1px solid var(--s100);}
.demo-title{font-size:11px;color:var(--s400);text-align:center;margin-bottom:8px;}
.demo-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px;
  background:var(--s50);
  border-radius:8px;margin-bottom:5px;
  cursor:pointer;transition:background .1s;
  border:1px solid transparent;
}
/* demo hover → navy-l (teal 제거) */
.demo-item:hover{background:var(--navy-l);border-color:rgba(37,99,235,.2);}
.demo-item:last-child{margin-bottom:0;}
.demo-role{font-size:11px;font-weight:600;color:var(--navy);}
.demo-email{font-size:11px;color:var(--s500);font-family:monospace;}

/* 회원가입 영역 */
.register-area{
  margin-top:20px;padding-top:18px;
  border-top:1px solid var(--s100);
  text-align:center;
}
.register-note{font-size:12px;color:var(--s400);margin-bottom:12px;}

/* 입점 신청 버튼 → navy (teal gradient 제거) */
.register-btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:11px 20px;
  background:var(--navy);
  color:#fff;border-radius:10px;
  font-size:13px;font-weight:700;
  text-decoration:none;
  transition:all .2s;
  box-shadow:0 2px 12px rgba(13,27,62,.2);
}
.register-btn:hover{background:var(--navy-h);transform:translateY(-1px);box-shadow:0 4px 18px rgba(13,27,62,.3);}

.register-badge{
  font-size:10px;
  background:rgba(37,99,235,.15);
  color:var(--blue);
  padding:2px 7px;border-radius:5px;font-weight:600;
}
.register-sub{font-size:11px;color:var(--s400);margin-top:16px;line-height:1.6;}
.register-sub strong{color:var(--blue);font-weight:700;}
</style>
<script src="js/gate.js"></script>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="logo">
      <!-- MEDIFLOW 로고 마크 -->
      <div class="logo-mark">
        <svg viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 11h4l2-5 4 10 2-5h4" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="logo-title">MEDIFLOW</div>
      <div class="logo-sub">글로벌 메디컬 플로우</div>
      <div class="hospital-badge">🏥 올래성형외과</div>
    </div>

    <div class="title">로그인</div>
    <div class="sub">병원 관리자 전용 시스템입니다.</div>

    <div class="error" id="err-msg"></div>

    <label class="f-label">이메일</label>
    <input class="f-input" type="email" id="inp-email" placeholder="admin@oleps.co.kr">
    <label class="f-label">비밀번호</label>
    <input class="f-input" type="password" id="inp-pw" placeholder="••••••••">

    <button class="login-btn" id="login-btn">로그인</button>

    <div class="demo">
      <div class="demo-title">데모 계정으로 시작</div>
      <div class="demo-item" id="demo-admin">
        <span class="demo-role">👑 관리자</span>
        <span class="demo-email">admin@oleps.co.kr</span>
        <span style="font-size:12px;color:var(--s400)">→</span>
      </div>
      <div class="demo-item" id="demo-staff">
        <span class="demo-role">👤 스탭</span>
        <span class="demo-email">staff@oleps.co.kr</span>
        <span style="font-size:12px;color:var(--s400)">→</span>
      </div>
    </div>

    <div class="register-area">
      <div class="register-note">아직 MEDIFLOW 계정이 없으신가요?</div>
      <a href="register.html" class="register-btn">
        🏥 병원 입점 신청하기
        <span class="register-badge">무료 상담</span>
      </a>
      <div class="register-sub">
        반나절에 일본어 글로벌 홈페이지 완성<br>
        Global Medical <strong>OS</strong>
      </div>
    </div>
  </div>
</div>

<script>
var ACCOUNTS = [
  { email:'admin@oleps.co.kr', password:'admin1234', name:'김지현', role:'admin', hospital:'올래성형외과' },
  { email:'staff@oleps.co.kr', password:'staff1234', name:'이수진', role:'staff', hospital:'올래성형외과' },
];
var STORAGE_KEY = 'hospital_user';
function saveSession(user) {
  var val = JSON.stringify(user);
  try { sessionStorage.setItem(STORAGE_KEY, val); } catch(e) {}
}
try { sessionStorage.removeItem('hospital_user'); } catch(e) {}
try { localStorage.removeItem('hospital_user'); } catch(e) {}

function doLogin() {
  var email = document.getElementById('inp-email').value.trim();
  var pw = document.getElementById('inp-pw').value;
  var err = document.getElementById('err-msg');
  err.style.display = 'none';
  if (!email || !pw) {
    err.textContent = '이메일과 비밀번호를 입력해주세요.';
    err.style.display = 'block'; return;
  }
  var found = null;
  for (var i = 0; i < ACCOUNTS.length; i++) {
    if (ACCOUNTS[i].email === email && ACCOUNTS[i].password === pw) { found = ACCOUNTS[i]; break; }
  }
  if (!found) {
    err.textContent = '이메일 또는 비밀번호가 올바르지 않습니다.';
    err.style.display = 'block'; return;
  }
  saveSession({ name: found.name, email: found.email, role: found.role, hospital: found.hospital });
  window.location.replace('index.html');
}
document.getElementById('demo-admin').addEventListener('click', function() {
  document.getElementById('inp-email').value = 'admin@oleps.co.kr';
  document.getElementById('inp-pw').value = 'admin1234';
  doLogin();
});
document.getElementById('demo-staff').addEventListener('click', function() {
  document.getElementById('inp-email').value = 'staff@oleps.co.kr';
  document.getElementById('inp-pw').value = 'staff1234';
  doLogin();
});
document.getElementById('login-btn').addEventListener('click', doLogin);
document.getElementById('inp-email').addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); });
document.getElementById('inp-pw').addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
