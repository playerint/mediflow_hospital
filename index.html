<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>홈 대시보드 — Hospital Site OS</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/common.css">
<link rel="stylesheet" href="css/dashboard.css">
<script src="js/gate.js"></script>
</head>
<body>
<div id="sidebar-mount" data-active="dashboard"></div>

<main class="main">
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-title">홈 대시보드</span>
      <span class="topbar-period" id="dashboard-period"></span>
    </div>
    <div class="topbar-right">
      <select style="font-size:12px;padding:5px 10px;border-radius:10px;border:1px solid var(--gray-200);background:#fff;color:var(--gray-700)">
        <option>이번 달</option><option>지난달</option><option>최근 3개월</option>
      </select>
      <a class="icon-btn" href="html/hospital_notifications.html" title="알림">🔔</a>
      <a class="icon-btn" href="html/hospital_settings.html" title="설정">⚙</a>
    </div>
  </div>
  <div class="content">
    <div class="kpi-grid" id="kpi-grid"></div>
    <div class="mid-grid">
      <div class="card">
        <div class="card-head"><div class="card-title">⚠ 지금 처리할 항목</div><a class="see-all" href="html/hospital_notifications.html">전체 보기</a></div>
        <div id="alert-list"></div>
      </div>
      <div class="card">
        <div class="card-head"><div class="card-title">▤ 빌드 진행 현황</div><span id="build-header-sub" style="font-size:12px;color:var(--gray-400)"></span></div>
        <div id="build-steps"></div>
      </div>
    </div>
    <div class="mid-grid">
      <div class="card">
        <div class="card-head"><div class="card-title">⬇ 문의 퍼널</div><a class="see-all" href="html/hospital_crm_inquiry_detail.html">상세 보기</a></div>
        <div class="funnel-row" id="funnel-row"></div>
        <div id="funnel-summary" style="font-size:12px;color:var(--gray-400)"></div>
      </div>
      <div class="card">
        <div class="card-head"><div class="card-title">📡 채널별 문의</div><a class="see-all" href="html/hospital_crm_inquiry_detail.html">비교 분석</a></div>
        <div id="ch-rows"></div>
      </div>
    </div>
    <div class="bottom-grid">
      <div class="card">
        <div class="card-head"><div class="card-title">📅 오늘 일정</div><a class="see-all" href="html/hospital_crm_booking.html">이번 주</a></div>
        <div id="sched-list"></div>
      </div>
      <div class="card">
        <div class="card-head"><div class="card-title">🧠 AEO 인용 현황</div><a class="see-all" href="html/hospital_reports.html">상세</a></div>
        <div id="aeo-list"></div>
        <div id="aeo-summary" style="font-size:12px;color:var(--gray-400);margin-top:8px"></div>
      </div>
      <div class="card">
        <div class="card-head"><div class="card-title">🤖 LINE 자동상담</div><a class="see-all" href="html/hospital_line_auto.html">설정</a></div>
        <div class="line-stat-grid" style="margin-bottom:12px">
          <div class="line-stat"><div class="line-stat-v" id="line-ai-rate"></div><div class="line-stat-l">AI 해결률</div></div>
          <div class="line-stat"><div class="line-stat-v" id="line-avg-resp"></div><div class="line-stat-l">평균 응답</div></div>
          <div class="line-stat"><div class="line-stat-v" id="line-conv-rate"></div><div class="line-stat-l">예약 전환</div></div>
        </div>
        <div style="position:relative;width:100%;height:80px"><canvas id="lineChart" role="img" aria-label="LINE 일별 처리">LINE 일별 처리 건수.</canvas></div>
      </div>
    </div>

    <footer class="site-footer">© 2026 MEDIFLOW. All rights reserved.</footer>
  </div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="js/auth.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/dashboard-data.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
