<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>접근 인증 — MEDIFLOW</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#0D1B3E;
  --navy-h:#162952;
  --navy-l:#EEF2FF;
  --blue:#2563EB;
  --red:#DC2626;
  --red-l:#FEF2F2;
  --s50:#F9FAFB;
  --s100:#F3F4F6;
  --s200:#E5E7EB;
  --s400:#9CA3AF;
  --s500:#6B7280;
  --s700:#374151;
  --s900:#111827;
}
body{
  font-family:'Pretendard Variable',-apple-system,'Apple SD Gothic Neo',sans-serif;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;
  background:var(--navy);
  -webkit-font-smoothing:antialiased;
}
/* navy 배경에 subtle blue radial */
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(circle at 20% 30%, rgba(37,99,235,.08) 0%, transparent 50%),
    radial-gradient(circle at 80% 70%, rgba(37,99,235,.05) 0%, transparent 50%);
  pointer-events:none;
}
.wrap{width:100%;max-width:420px;padding:20px;position:relative;z-index:1;}

/* 카드 */
.card{
  background:rgba(255,255,255,.97);
  border-radius:20px;
  padding:44px 40px;
  box-shadow:0 24px 80px rgba(0,0,0,.35);
  animation:fadeIn .3s ease both;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* 로고 */
.logo-area{text-align:center;margin-bottom:32px;}
.logo-icon{
  width:56px;height:56px;
  background:var(--navy);
  border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 14px;
  box-shadow:0 4px 16px rgba(13,27,62,.3);
}
.logo-icon svg{width:26px;height:26px;}
.logo-title{font-size:15px;font-weight:800;color:var(--navy);letter-spacing:.04em;}
.logo-sub{font-size:12px;color:var(--s400);margin-top:3px;letter-spacing:.06em;text-transform:uppercase;}
.logo-sub strong{color:var(--blue);}

/* 잠금 배지 — amber→gray (ZENO v2: amber 완전 제거) */
.lock-badge{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--s100);
  border:1px solid var(--s200);
  border-radius:8px;padding:4px 12px;
  font-size:12px;color:var(--s700);font-weight:600;margin-top:8px;
}

.title{font-size:20px;font-weight:800;color:var(--navy);margin-bottom:6px;text-align:center;}
.sub{font-size:13px;color:var(--s500);text-align:center;margin-bottom:28px;line-height:1.6;}

.f-label{font-size:12px;font-weight:600;color:var(--s700);margin-bottom:6px;display:block;}
.pw-wrap{position:relative;margin-bottom:8px;}
.f-input{
  width:100%;padding:12px 44px 12px 16px;
  border:1.5px solid var(--s200);
  border-radius:12px;font-size:15px;
  font-family:inherit;outline:none;
  color:var(--s900);transition:all .2s;
  letter-spacing:.1em;
}
/* focus ring → blue */
.f-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.08);}
.f-input.shake{animation:shake .4s ease;}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}

.toggle-pw{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  cursor:pointer;color:var(--s400);font-size:16px;user-select:none;
}
.toggle-pw:hover{color:var(--s700);}

.error{
  font-size:12px;color:var(--red);
  margin-bottom:12px;display:none;
  padding:8px 12px;
  background:var(--red-l);
  border-radius:8px;border:1px solid #FCA5A5;
  text-align:center;
}

/* 입장 버튼 → navy (teal gradient 완전 제거) */
.btn{
  width:100%;padding:13px;
  background:var(--navy);
  color:#fff;border:none;border-radius:12px;
  font-size:15px;font-weight:700;
  font-family:inherit;cursor:pointer;
  transition:all .2s;
  box-shadow:0 4px 16px rgba(13,27,62,.25);
}
.btn:hover{background:var(--navy-h);transform:translateY(-1px);box-shadow:0 6px 20px rgba(13,27,62,.35);}
.btn:active{transform:translateY(0);}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}

.footer-note{text-align:center;font-size:12px;color:var(--s400);margin-top:20px;line-height:1.6;}
.footer-note strong{color:var(--navy);font-weight:700;}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="logo-area">
      <div class="logo-icon">
        <svg viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 13h5l2.5-6 5 12 2.5-6H22" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="logo-title">MEDIFLOW</div>
      <div class="logo-sub">Prototype · Global Medical <strong>OS</strong></div>
      <div class="lock-badge">🔒 비공개 프로토타입</div>
    </div>

    <div class="title">접근 인증</div>
    <div class="sub">이 페이지는 초대된 분만 열람할 수 있습니다.<br>공유받은 비밀번호를 입력해 주세요.</div>

    <label class="f-label">비밀번호</label>
    <div class="pw-wrap">
      <input class="f-input" type="password" id="pw-input" placeholder="비밀번호 입력" autocomplete="off">
      <span class="toggle-pw" id="toggle-pw" title="비밀번호 표시">👁</span>
    </div>
    <div class="error" id="pw-error">비밀번호가 올바르지 않습니다. 다시 시도해 주세요.</div>
    <button class="btn" id="enter-btn">입장하기</button>

    <div class="footer-note">
      비밀번호를 모르시면 공유자에게 문의해 주세요.<br>
      <strong>MEDIFLOW</strong>
    </div>
  </div>
</div>

<script>
var GATE_KEY = 'proto_gate_2026';
var GATE_PW  = '0102';

(function() {
  function isOpen() {
    try { return sessionStorage.getItem(GATE_KEY) === GATE_PW; } catch(e) { return false; }
  }
  if (isOpen()) { window.location.replace('login.html'); }
})();

var showPw = false;
document.getElementById('toggle-pw').addEventListener('click', function() {
  showPw = !showPw;
  var inp = document.getElementById('pw-input');
  inp.type = showPw ? 'text' : 'password';
  this.textContent = showPw ? '🙈' : '👁';
  inp.focus();
});

function tryEnter() {
  var pw  = document.getElementById('pw-input').value;
  var err = document.getElementById('pw-error');
  var btn = document.getElementById('enter-btn');
  var inp = document.getElementById('pw-input');
  if (!pw) { err.textContent = '비밀번호를 입력해 주세요.'; err.style.display = 'block'; inp.focus(); return; }
  if (pw === GATE_PW) {
    btn.disabled = true; btn.textContent = '✓ 인증 완료...';
    try { sessionStorage.setItem(GATE_KEY, GATE_PW); } catch(e) {}
    setTimeout(function() { window.location.replace('login.html'); }, 600);
  } else {
    err.textContent = '비밀번호가 올바르지 않습니다. 다시 시도해 주세요.';
    err.style.display = 'block';
    inp.classList.add('shake');
    inp.value = '';
    setTimeout(function() { inp.classList.remove('shake'); }, 400);
    inp.focus();
  }
}
document.getElementById('enter-btn').addEventListener('click', tryEnter);
document.getElementById('pw-input').addEventListener('keydown', function(e) { if (e.key === 'Enter') tryEnter(); });
</script>
</body>
</html>
