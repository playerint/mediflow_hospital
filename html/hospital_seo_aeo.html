<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SEO·AEO 관리 — Hospital Site OS</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
<link rel="stylesheet" href="../css/common.css">
<link rel="stylesheet" href="../css/site.css">
<script src="../js/gate.js"></script>
<style>
.seo-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.cwv-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px;}
.cwv-card{background:var(--gray-50);border-radius:10px;padding:12px 14px;text-align:center;}
.cwv-val{font-size:20px;font-weight:700;color:var(--navy);margin-bottom:2px;}
.cwv-lbl{font-size:10px;color:var(--gray-400);text-transform:uppercase;letter-spacing:.04em;}
.cwv-grade{font-size:10px;font-weight:600;padding:2px 7px;border-radius:8px;background:#D1FAE5;color:#065F46;margin-top:4px;display:inline-block;}
.kw-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--gray-100);}
.kw-row:last-child{border-bottom:none;}
.kw-rank{width:28px;height:28px;border-radius:8px;background:var(--navy);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.kw-rank.top{background:var(--teal,#0D9488);}
.kw-word{flex:1;font-size:13px;color:var(--gray-800);font-weight:500;}
.kw-vol{font-size:12px;color:var(--gray-400);}
.kw-trend{font-size:12px;font-weight:600;}
.schema-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--gray-100);}
.schema-row:last-child{border-bottom:none;}
.aeo-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--gray-100);}
.aeo-row:last-child{border-bottom:none;}
.aeo-q{flex:1;font-size:12px;color:var(--gray-800);}
.meta-row{display:flex;flex-direction:column;gap:6px;padding:12px 0;border-bottom:1px solid var(--gray-100);}
.meta-row:last-child{border-bottom:none;}
.meta-page{font-size:12px;font-weight:600;color:var(--gray-400);text-transform:uppercase;}
.meta-title{font-size:12px;color:var(--navy);font-weight:500;}
.meta-desc{font-size:12px;color:var(--gray-500);line-height:1.5;}
.badge-ok{background:#D1FAE5;color:#065F46;font-size:10px;padding:2px 7px;border-radius:6px;font-weight:600;}
.badge-warn{background:#FEF3C7;color:#92400E;font-size:10px;padding:2px 7px;border-radius:6px;font-weight:600;}
.badge-ai{background:var(--blue-b);color:var(--blue);font-size:10px;padding:2px 7px;border-radius:6px;font-weight:600;flex-shrink:0;}
.aeo-section-sep{font-size:10px;font-weight:700;color:var(--s400);padding:10px 0 4px;margin-top:6px;border-top:1px solid var(--s100);letter-spacing:.04em;}
.aeo-pending-row{background:var(--blue-l);border-radius:8px;padding:8px 10px !important;margin:2px 0;}
.meta-pending-block{margin-top:8px;padding:10px 12px;background:var(--blue-l);border-radius:8px;display:flex;flex-direction:column;gap:6px;}
.meta-pending-label{font-size:10px;font-weight:700;color:var(--blue);margin-bottom:2px;}
.meta-pending-val{font-size:12px;color:var(--s700);line-height:1.5;}
.meta-pending-actions{display:flex;gap:6px;margin-top:4px;}
</style>
</head><body>
<div id="sidebar-mount" data-active="site_seo"></div>
<main class="main">
  <div class="topbar">
    <div class="topbar-left">
      <a class="topbar-back" href="../index.html">← 대시보드</a>
      <span style="color:var(--gray-300)">/</span><span class="topbar-title">사이트 관리</span>
      <span style="font-size:12px;color:var(--gray-400)">/</span>
      <span style="font-size:14px;color:var(--gray-600)">SEO·AEO 관리</span>
    </div>
    <div class="topbar-right">
      <button class="btn" onclick="requestAISEO()">📋 종합 분석 리포트</button>
      <button class="btn btn-primary" onclick="saveSEOSettings()">💾 저장</button>
    </div>
  </div>
  <div class="content">
    <div class="tab-bar">
      <button class="tab" onclick="location.href='hospital_site_content.html'">콘텐츠 편집</button>
      <button class="tab" onclick="location.href='hospital_site_assets.html'">이미지 관리</button>
      <button class="tab active">SEO·AEO</button>
      <button class="tab" onclick="location.href='hospital_site_preview.html'">미리보기 & 게시</button>
    </div>

    <!-- Core Web Vitals -->
    <div class="card" style="margin-bottom:14px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div class="card-title">⚡ Core Web Vitals</div>
        <div id="cwv-score-badge" style="font-size:13px;font-weight:700;color:var(--green)"></div>
      </div>
      <div class="cwv-grid" id="cwv-grid"></div>
    </div>

    <div class="seo-grid">
      <!-- 키워드 순위 -->
      <div class="card">
        <div class="card-title" style="margin-bottom:4px">🔍 SEO 키워드 순위</div>
        <div style="font-size:11px;color:var(--s400);margin-bottom:12px">Yahoo Japan 검색 결과에서 이 사이트가 몇 번째로 노출되는지를 보여줍니다. 숫자가 낮을수록 상위 노출입니다.</div>
        <div id="kw-list"></div>
      </div>

      <!-- AEO 타겟 질문 -->
      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
          <div class="card-title">🧠 AEO 타겟 질문</div>
          <button class="btn" id="aeo-suggest-btn" style="font-size:12px;padding:3px 9px" onclick="generateAEOSuggestions()">🤖 AI 제안 받기</button>
        </div>
        <div id="aeo-list"></div>
      </div>
    </div>

    <!-- 메타태그 편집 -->
    <div class="card" style="margin-bottom:14px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div class="card-title">🏷 메타태그 편집</div>
        <button class="btn" id="meta-suggest-btn" style="font-size:12px;padding:3px 9px" onclick="generateMetaSuggestions()">🤖 AI 메타태그 제안</button>
      </div>
      <div id="meta-list"></div>
    </div>

    <footer class="site-footer">© 2026 MEDIFLOW. All rights reserved.</footer>
  </div>
</main>

<script src="../js/auth.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/config.js"></script>
<script src="../js/gemini.js"></script>
<script src="../js/site-data.js"></script>
<script>
/* ── Core Web Vitals ─────────────────────────────────────────── */
function renderCWV() {
  var d = SITE_SEO.coreWebVitals;
  var badge = document.getElementById('cwv-score-badge');
  if (badge) badge.textContent = '종합 ' + d.score + '점 · ' + d.grade;
  var items = [
    { lbl:'로딩 속도(LCP)', val:d.lcp, note:'Largest Contentful Paint' },
    { lbl:'반응 속도(INP)', val:d.inp, note:'Interaction to Next Paint' },
    { lbl:'화면 안정성(CLS)', val:d.cls, note:'Cumulative Layout Shift' },
    { lbl:'종합', val:d.score + '점', note:'Performance Score' },
  ];
  var el = document.getElementById('cwv-grid');
  el.innerHTML = items.map(function(i) {
    return '<div class="cwv-card">'
      + '<div class="cwv-val">' + i.val + '</div>'
      + '<div class="cwv-lbl">' + i.lbl + '</div>'
      + '<div class="cwv-grade">Good</div>'
      + '</div>';
  }).join('');
}

/* ── 키워드 순위 ──────────────────────────────────────────────── */
function renderKeywords() {
  var el = document.getElementById('kw-list');
  var tc = { up:'var(--green)', down:'var(--red)', same:'var(--gray-400)' };
  var ic = { up:'↑', down:'↓', same:'→' };

  var mainRows = SITE_SEO.keywords.slice().sort(function(a,b){ return a.rank - b.rank; }).map(function(k) {
    return '<div class="kw-row">'
      + '<div class="kw-rank' + (k.rank <= 3 ? ' top' : '') + '">' + k.rank + '</div>'
      + '<div class="kw-word">' + k.kw + '</div>'
      + '<div class="kw-vol">' + k.vol.replace('/월', '번 노출/월') + '</div>'
      + '<div class="kw-trend" style="color:' + tc[k.trend] + '">' + ic[k.trend] + '</div>'
      + '</div>';
  }).join('');

  el.innerHTML = mainRows;
}

/* ── AEO 저장소 ───────────────────────────────────────────────── */
var aeoPending = [];

function loadAEOStorage() {
  try {
    var saved = localStorage.getItem('aeo_targets');
    if (saved) SITE_SEO.aeoTargets = JSON.parse(saved);
    var pend = localStorage.getItem('aeo_pending');
    if (pend) aeoPending = JSON.parse(pend);
  } catch(e) {}
}

function saveAEOStorage() {
  try {
    localStorage.setItem('aeo_targets', JSON.stringify(SITE_SEO.aeoTargets));
    localStorage.setItem('aeo_pending', JSON.stringify(aeoPending));
  } catch(e) {}
}

/* ── AEO 타겟 질문 ────────────────────────────────────────────── */
function renderAEO() {
  var el = document.getElementById('aeo-list');

  var activeHtml = SITE_SEO.aeoTargets.length === 0
    ? '<div style="font-size:12px;color:var(--s400);padding:12px 0">등록된 질문이 없습니다.</div>'
    : SITE_SEO.aeoTargets.map(function(a, idx) {
        var cited = a.cited
          ? '<span class="badge-ok">인용됨 · ' + a.lastSeen + '</span>'
          : '<span class="badge-warn">미인용</span>';
        return '<div class="aeo-row" style="flex-wrap:wrap;gap:6px">'
          + '<div class="aeo-q">' + a.q + '</div>'
          + '<span style="font-size:10px;color:var(--gray-400);flex-shrink:0">' + a.engine + '</span>'
          + cited
          + '<button class="btn" style="font-size:10px;padding:2px 7px;flex-shrink:0" onclick="editAEOTarget(this)">편집</button>'
          + '</div>';
      }).join('');

  var pendingHtml = '';
  if (aeoPending.length > 0) {
    pendingHtml = '<div class="aeo-section-sep">🤖 AI 제안 검토 (' + aeoPending.length + '개)</div>'
      + aeoPending.map(function(a, idx) {
          return '<div class="aeo-row aeo-pending-row" style="flex-wrap:wrap;gap:6px">'
            + '<div class="aeo-q">' + a.q + '</div>'
            + '<span style="font-size:10px;color:var(--gray-400);flex-shrink:0">' + a.engine + '</span>'
            + '<span class="badge-ai">AI 제안</span>'
            + '<button class="btn btn-primary" style="font-size:10px;padding:2px 8px;flex-shrink:0" onclick="approveAEO(' + idx + ')">✓ 승인</button>'
            + '<button class="btn btn-danger" style="font-size:10px;padding:2px 8px;flex-shrink:0" onclick="rejectAEO(' + idx + ')">✗ 거부</button>'
            + '</div>';
        }).join('');
  }

  el.innerHTML = activeHtml + pendingHtml;
}

/* ── AI 제안 생성 ─────────────────────────────────────────────── */
function generateAEOSuggestions() {
  var btn = document.getElementById('aeo-suggest-btn');
  btn.disabled = true;
  btn.textContent = '생성 중...';
  showToast('🤖 Gemini가 AEO 타겟 질문을 생성 중...', '');

  var currentQs = SITE_SEO.aeoTargets.concat(aeoPending).map(function(a){ return a.q; }).join('\n');
  var prompt = '일본인 환자를 대상으로 하는 한국 성형외과(올래성형외과)를 위한 AEO 최적화 타겟 질문 3개를 제안해주세요.\n'
    + '조건:\n'
    + '- ChatGPT·Perplexity·Gemini 등 AI 검색엔진에서 일본인 환자가 실제로 물을 법한 질문\n'
    + '- 일본어로 작성\n'
    + '- 성형외과 진료 특화 (코·눈·리프팅·지방흡입 등)\n'
    + '이미 등록된 질문 (중복 제외):\n' + (currentQs || '없음') + '\n\n'
    + '반드시 아래 JSON 배열 형식만 반환 (설명·마크다운 금지):\n'
    + '[{"q":"질문내용","engine":"ChatGPT"},{"q":"질문내용","engine":"Perplexity"}]';

  callGemini(prompt, function(err, result) {
    btn.disabled = false;
    btn.textContent = '🤖 AI 제안 받기';
    if (err || !result) { showToast('⚠ AI 제안 생성에 실패했습니다.', 'error'); return; }
    try {
      var suggestions = safeParseJSON(result);
      if (!Array.isArray(suggestions) || suggestions.length === 0) throw new Error('parse');
      var existingQs = SITE_SEO.aeoTargets.concat(aeoPending).map(function(a){ return a.q; });
      var fresh = suggestions.filter(function(s){ return existingQs.indexOf(s.q) === -1; });
      if (fresh.length === 0) { showToast('모든 제안이 이미 등록된 질문입니다.', 'error'); return; }
      aeoPending = aeoPending.concat(fresh);
      saveAEOStorage();
      renderAEO();
      showToast('✓ ' + fresh.length + '개 질문이 제안됐습니다. 검토 후 승인해주세요.', 'success');
    } catch(e) {
      showToast('⚠ AI 응답 파싱에 실패했습니다.', 'error');
    }
  });
}

function approveAEO(idx) {
  var item = aeoPending[idx];
  if (!item) return;
  SITE_SEO.aeoTargets.push({ q: item.q, engine: item.engine, cited: false, lastSeen: '-' });
  aeoPending.splice(idx, 1);
  saveAEOStorage();
  renderAEO();
  showToast('✓ 질문이 승인되어 활성 목록에 추가됐습니다.', 'success');
}

function rejectAEO(idx) {
  aeoPending.splice(idx, 1);
  saveAEOStorage();
  renderAEO();
  showToast('거부됐습니다.', '');
}

/* ── 메타태그 저장소 ──────────────────────────────────────────── */
var metaPending = {};

function loadMetaStorage() {
  try {
    var saved = localStorage.getItem('meta_data');
    if (saved) SITE_SEO.meta = JSON.parse(saved);
    var pend = localStorage.getItem('meta_pending');
    if (pend) metaPending = JSON.parse(pend);
  } catch(e) {}
}

function saveMetaStorage() {
  try {
    localStorage.setItem('meta_data', JSON.stringify(SITE_SEO.meta));
    localStorage.setItem('meta_pending', JSON.stringify(metaPending));
  } catch(e) {}
}

/* ── 메타태그 렌더 ────────────────────────────────────────────── */
function renderMeta() {
  var el = document.getElementById('meta-list');
  el.innerHTML = SITE_SEO.meta.map(function(m, i) {
    var pending = metaPending[i];
    var pendingBlock = '';
    if (pending) {
      pendingBlock = '<div class="meta-pending-block">'
        + '<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">'
        + '<span class="badge-ai">AI 제안</span>'
        + '<span style="font-size:10px;color:var(--s500)">현재 값과 비교 후 승인해주세요</span>'
        + '</div>'
        + '<div><div class="meta-pending-label">TITLE</div>'
        + '<div class="meta-pending-val">' + pending.title + '</div></div>'
        + '<div><div class="meta-pending-label">DESCRIPTION</div>'
        + '<div class="meta-pending-val">' + pending.desc + '</div></div>'
        + '<div class="meta-pending-actions">'
        + '<button class="btn btn-primary" style="font-size:10px;padding:3px 10px" onclick="approveMeta(' + i + ')">✓ 승인</button>'
        + '<button class="btn btn-danger" style="font-size:10px;padding:3px 10px" onclick="rejectMeta(' + i + ')">✗ 거부</button>'
        + '</div>'
        + '</div>';
    }
    return '<div class="meta-row">'
      + '<div style="display:flex;align-items:center;gap:8px">'
      + '<span class="meta-page">' + m.page + '</span>'
      + '<span class="' + (m.status === 'ok' ? 'badge-ok' : 'badge-warn') + '">'
      + (m.status === 'ok' ? '최적화됨' : '검토 필요') + '</span>'
      + '<button class="btn" style="font-size:10px;padding:2px 7px;margin-left:auto" onclick="editMeta(' + i + ')">편집</button>'
      + '</div>'
      + '<div class="meta-title">' + m.title + '</div>'
      + '<div class="meta-desc">' + m.desc + '</div>'
      + pendingBlock
      + '</div>';
  }).join('');
}

/* ── AI 메타태그 제안 ─────────────────────────────────────────── */
function generateMetaSuggestions() {
  var btn = document.getElementById('meta-suggest-btn');
  btn.disabled = true;
  btn.textContent = '생성 중...';
  showToast('🤖 Gemini가 메타태그를 분석 중...', '');

  var currentMeta = SITE_SEO.meta.map(function(m, i) {
    return '[' + i + '] ' + m.page + ' | title: "' + m.title + '" | desc: "' + m.desc + '"';
  }).join('\n');

  var prompt = '일본인 환자 대상 한국 성형외과(올래성형외과) 웹사이트의 메타태그를 SEO 최적화해주세요.\n\n'
    + '현재 메타태그:\n' + currentMeta + '\n\n'
    + '조건:\n'
    + '- Title: 60자 이내, 핵심 키워드 포함, 클릭 유도\n'
    + '- Description: 160자 이내, 차별화 포인트 강조\n'
    + '- 일본어로 작성\n'
    + '- 각 페이지 고유 콘텐츠에 맞게 작성\n\n'
    + '반드시 아래 JSON 배열 형식만 반환 (설명·마크다운 금지):\n'
    + '[{"idx":0,"title":"...","desc":"..."},{"idx":1,"title":"...","desc":"..."}]';

  callGemini(prompt, function(err, result) {
    btn.disabled = false;
    btn.textContent = '🤖 AI 메타태그 제안';
    if (err || !result) { showToast('⚠ AI 제안 생성에 실패했습니다.', 'error'); return; }
    try {
      var suggestions = safeParseJSON(result);
      if (!Array.isArray(suggestions) || suggestions.length === 0) throw new Error('parse');
      suggestions.forEach(function(s) {
        if (typeof s.idx === 'number' && s.title && s.desc) {
          metaPending[s.idx] = { title: s.title, desc: s.desc };
        }
      });
      saveMetaStorage();
      renderMeta();
      showToast('✓ ' + suggestions.length + '개 페이지 메타태그 제안이 생성됐습니다.', 'success');
    } catch(e) {
      showToast('⚠ AI 응답 파싱에 실패했습니다.', 'error');
    }
  });
}

function approveMeta(idx) {
  var p = metaPending[idx];
  if (!p) return;
  SITE_SEO.meta[idx].title = p.title;
  SITE_SEO.meta[idx].desc = p.desc;
  SITE_SEO.meta[idx].status = p.title.length <= 60 && p.desc.length <= 160 ? 'ok' : 'warn';
  delete metaPending[idx];
  saveMetaStorage();
  renderMeta();
  showToast('✓ 메타태그가 적용됐습니다.', 'success');
}

function rejectMeta(idx) {
  delete metaPending[idx];
  saveMetaStorage();
  renderMeta();
  showToast('제안이 거부됐습니다.', '');
}

/* ── AI SEO 개선 제안 (Gemini) ────────────────────────────────── */
function requestAISEO() {
  showToast('🤖 Gemini가 SEO 개선 포인트를 분석 중...', '');
  var prompt = '일본인 환자를 대상으로 하는 한국 성형외과(올래성형외과) 웹사이트의 SEO·AEO 개선점을 분석해주세요.\n'
    + '현재 Core Web Vitals 98점, 키워드 순위 1~7위, AEO 인용 6개 중 4개.\n'
    + '개선 우선순위 3가지를 간결하게 한국어로 제안해주세요.';
  callGemini(prompt, function(err, result) {
    if (err || !result) { showToast('⚠ AI 제안 실패', 'error'); return; }
    openModal('📋 종합 분석 리포트', result.replace(/\n/g,'<br>'), null, '닫기', '');
  });
}

function editAEOTarget(btn) {
  var row = btn.closest('.aeo-row');
  var qEl = row.querySelector('.aeo-q');
  var currentQ = qEl.firstChild ? qEl.firstChild.textContent.trim() : qEl.textContent.trim();
  var idx = Array.from(document.querySelectorAll('.aeo-row')).indexOf(row);

  var prev = document.getElementById('__aeo-edit-modal');
  if (prev) prev.remove();
  var m = document.createElement('div');
  m.id = '__aeo-edit-modal';
  m.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9500;display:flex;align-items:center;justify-content:center;padding:20px';
  m.innerHTML = '<div style="background:#fff;border-radius:16px;width:100%;max-width:520px;box-shadow:0 20px 60px rgba(0,0,0,.25);overflow:hidden">'
    + '<div style="padding:20px 24px;border-bottom:1px solid var(--gray-100)">'
    + '<div style="font-size:15px;font-weight:700;color:var(--navy)">✏ AEO 타겟 질문 편집</div>'
    + '</div>'
    + '<div style="padding:20px 24px">'
    + '<div style="font-size:12px;font-weight:600;color:var(--gray-600);margin-bottom:6px">질문 <span style="color:var(--red)">*</span></div>'
    + '<textarea id="__aeo-edit-q" rows="3" style="width:100%;font-size:13px;padding:10px;border:1.5px solid var(--gray-200);border-radius:8px;resize:vertical;font-family:inherit;line-height:1.6;outline:none;box-sizing:border-box">' + currentQ.replace(/</g,'&lt;') + '</textarea>'
    + '</div>'
    + '<div style="padding:16px 24px;background:var(--gray-50);display:flex;gap:8px;justify-content:flex-end">'
    + '<button class="btn" onclick="document.getElementById(\'__aeo-edit-modal\').remove()">취소</button>'
    + '<button class="btn btn-primary" onclick="submitEditAEO(' + idx + ')">저장</button>'
    + '</div>'
    + '</div>';
  m.addEventListener('click', function(e){ if (e.target === m) m.remove(); });
  document.body.appendChild(m);
  var ta = document.getElementById('__aeo-edit-q');
  ta.focus();
  ta.setSelectionRange(ta.value.length, ta.value.length);
}

function submitEditAEO(idx) {
  var q = document.getElementById('__aeo-edit-q').value.trim();
  if (!q) { showToast('질문을 입력해주세요.', 'error'); return; }
  if (SITE_SEO.aeoTargets[idx]) SITE_SEO.aeoTargets[idx].q = q;
  renderAEO();
  document.getElementById('__aeo-edit-modal').remove();
  showToast('✓ 수정되었습니다.', 'success');
}

function editMeta(idx) {
  var m = SITE_SEO.meta[idx];
  var prev = document.getElementById('__meta-edit-modal');
  if (prev) prev.remove();
  var modal = document.createElement('div');
  modal.id = '__meta-edit-modal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9500;display:flex;align-items:center;justify-content:center;padding:20px';
  modal.innerHTML = '<div style="background:#fff;border-radius:16px;width:100%;max-width:560px;box-shadow:0 20px 60px rgba(0,0,0,.25);overflow:hidden">'
    + '<div style="padding:20px 24px;border-bottom:1px solid var(--gray-100)">'
    + '<div style="font-size:15px;font-weight:700;color:var(--navy)">🏷 메타태그 편집 — ' + m.page + '</div>'
    + '</div>'
    + '<div style="padding:20px 24px;display:flex;flex-direction:column;gap:14px">'
    + '<div>'
    + '<div style="font-size:12px;font-weight:600;color:var(--gray-600);margin-bottom:6px">Title 태그 <span style="color:var(--red)">*</span></div>'
    + '<input id="__meta-title" type="text" value="' + m.title.replace(/"/g,'&quot;') + '" style="width:100%;font-size:13px;padding:10px;border:1.5px solid var(--gray-200);border-radius:8px;font-family:inherit;outline:none;box-sizing:border-box">'
    + '<div id="__meta-title-cnt" style="font-size:11px;color:var(--gray-400);margin-top:3px;text-align:right">' + m.title.length + ' / 60자 권장</div>'
    + '</div>'
    + '<div>'
    + '<div style="font-size:12px;font-weight:600;color:var(--gray-600);margin-bottom:6px">Description 태그</div>'
    + '<textarea id="__meta-desc" rows="3" style="width:100%;font-size:13px;padding:10px;border:1.5px solid var(--gray-200);border-radius:8px;resize:vertical;font-family:inherit;line-height:1.6;outline:none;box-sizing:border-box">' + m.desc.replace(/</g,'&lt;') + '</textarea>'
    + '<div id="__meta-desc-cnt" style="font-size:11px;color:var(--gray-400);margin-top:3px;text-align:right">' + m.desc.length + ' / 160자 권장</div>'
    + '</div>'
    + '</div>'
    + '<div style="padding:16px 24px;background:var(--gray-50);display:flex;gap:8px;justify-content:flex-end">'
    + '<button class="btn" onclick="document.getElementById(\'__meta-edit-modal\').remove()">취소</button>'
    + '<button class="btn btn-primary" onclick="submitEditMeta(' + idx + ')">저장</button>'
    + '</div>'
    + '</div>';
  modal.addEventListener('click', function(e){ if (e.target === modal) modal.remove(); });
  document.body.appendChild(modal);
  var titleInput = document.getElementById('__meta-title');
  titleInput.focus();
  titleInput.addEventListener('input', function() {
    var cnt = document.getElementById('__meta-title-cnt');
    if (cnt) cnt.textContent = this.value.length + ' / 60자 권장';
    cnt.style.color = this.value.length > 60 ? 'var(--red)' : 'var(--gray-400)';
  });
  document.getElementById('__meta-desc').addEventListener('input', function() {
    var cnt = document.getElementById('__meta-desc-cnt');
    if (cnt) cnt.textContent = this.value.length + ' / 160자 권장';
    cnt.style.color = this.value.length > 160 ? 'var(--red)' : 'var(--gray-400)';
  });
}

function submitEditMeta(idx) {
  var title = document.getElementById('__meta-title').value.trim();
  var desc  = document.getElementById('__meta-desc').value.trim();
  if (!title) { showToast('Title 태그를 입력해주세요.', 'error'); return; }
  SITE_SEO.meta[idx].title = title;
  if (desc) SITE_SEO.meta[idx].desc = desc;
  SITE_SEO.meta[idx].status = title.length <= 60 && desc.length <= 160 ? 'ok' : 'warn';
  renderMeta();
  document.getElementById('__meta-edit-modal').remove();
  showToast('✓ 메타태그가 저장되었습니다.', 'success');
}

function showToast(msg, type) {
  var e = document.getElementById('__toast'); if (e) e.remove();
  var bg = type==='success'?'#059669':type==='error'?'#DC2626':'#0D1B3E';
  var t = document.createElement('div'); t.id='__toast';
  t.style.cssText='position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:'+bg+';color:#fff;padding:11px 22px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.2);z-index:9999;white-space:nowrap';
  t.textContent=msg; document.body.appendChild(t);
  setTimeout(function(){t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(function(){t.remove();},300);},2500);
}

function openModal(title, bodyHtml, onConfirm, confirmLabel, confirmClass) {
  var e = document.getElementById('__modal'); if (e) e.remove();
  var m = document.createElement('div'); m.id='__modal';
  m.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9000;display:flex;align-items:center;justify-content:center;padding:24px 16px';
  m.innerHTML='<div style="background:#fff;border-radius:16px;width:100%;max-width:500px;max-height:90vh;box-shadow:0 20px 60px rgba(0,0,0,.2);display:flex;flex-direction:column">'
    +'<div style="padding:24px 28px 16px;font-size:16px;font-weight:700;color:#0D1B3E;flex-shrink:0;border-bottom:1px solid #F3F4F6">'+title+'</div>'
    +'<div style="padding:16px 28px;font-size:13px;color:#374151;line-height:1.7;overflow-y:auto;flex:1">'+bodyHtml+'</div>'
    +'<div style="padding:16px 28px;display:flex;gap:8px;justify-content:flex-end;flex-shrink:0;border-top:1px solid #F3F4F6">'
    +'<button class="btn '+(confirmClass||'btn-primary')+'" onclick="document.getElementById(\'__modal\').remove()">'+(confirmLabel||'닫기')+'</button>'
    +'</div></div>';
  m.addEventListener('click', function(e){ if(e.target===m) m.remove(); });
  document.body.appendChild(m);
}

/* ── 저장 ─────────────────────────────────────────────────────── */
function saveSEOSettings() {
  try {
    var now = new Date();
    sessionStorage.setItem('seo_settings', JSON.stringify({
      aeoTargets: SITE_SEO.aeoTargets,
      meta: SITE_SEO.meta,
      savedAt: now.getHours() + ':' + String(now.getMinutes()).padStart(2, '0')
    }));
    showToast('✓ SEO·AEO 설정이 저장되었습니다.', 'success');
  } catch(e) {
    showToast('저장에 실패했습니다.', 'error');
  }
}

/* ── 초기화 ─────────────────────────────────────────────────── */
loadAEOStorage();
loadMetaStorage();
renderCWV();
renderKeywords();
renderAEO();
renderMeta();
</script>
