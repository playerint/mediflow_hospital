<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>계정 설정 — Hospital Site OS</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Pretendard Variable',-apple-system,'Apple SD Gothic Neo',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0D1B3E;padding:20px;-webkit-font-smoothing:antialiased;}
.wrap{width:100%;max-width:460px;}
.card{background:#fff;border-radius:20px;padding:40px 36px;box-shadow:0 20px 60px rgba(0,0,0,.3);}
:root{--navy:#0D1B3E;--navy-h:#162952;--navy-l:#EEF2FF;--blue:#2563EB;--blue-l:#EFF6FF;--red:#DC2626;--green:#059669;--s100:#F3F4F6;--s200:#E5E7EB;--s400:#9CA3AF;--s700:#374151;--s900:#111827;}
/* 단계 표시 */
.steps{display:flex;align-items:center;justify-content:center;gap:0;margin-bottom:28px;}
.step{display:flex;flex-direction:column;align-items:center;gap:4px;}
.step-circle{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;transition:all .3s;}
/* ZENO v2: done → navy, active → blue */
.step-circle.done{background:var(--navy);color:#fff;}
.step-circle.active{background:var(--blue);color:#fff;}
.step-circle.idle{background:#F3F4F6;color:#9CA3AF;}
.step-label{font-size:10px;color:#9CA3AF;white-space:nowrap;}
.step-label.active{color:var(--navy);font-weight:600;}
.step-line{width:40px;height:2px;background:#F3F4F6;margin-bottom:16px;transition:background .3s;}
/* ZENO v2: done line → navy */
.step-line.done{background:var(--navy);}
.section{display:none;}.section.active{display:block;}
.logo{text-align:center;margin-bottom:24px;}
.logo-title{font-size:14px;font-weight:800;color:var(--navy);letter-spacing:.06em;}
.logo-sub{font-size:10px;color:#9CA3AF;margin-top:3px;letter-spacing:.08em;text-transform:uppercase;}
/* ZENO v2: invite-badge → navy-l */
.invite-badge{display:inline-flex;align-items:center;gap:6px;background:var(--navy-l);border:1px solid #DBEAFE;border-radius:8px;padding:5px 14px;font-size:12px;color:var(--navy);font-weight:600;margin-top:8px;}
.sec-title{font-size:18px;font-weight:700;color:var(--navy);margin-bottom:4px;}
.sec-sub{font-size:13px;color:#6B7280;margin-bottom:22px;line-height:1.6;}
.f-label{font-size:12px;font-weight:600;color:#374151;margin-bottom:5px;display:block;}
.f-input{width:100%;padding:10px 14px;border:1.5px solid #E5E7EB;border-radius:10px;font-size:14px;font-family:inherit;outline:none;color:#111827;transition:border .15s;margin-bottom:14px;display:block;}
/* ZENO v2: focus → blue */
.f-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.08);}
.f-input.error{border-color:#DC2626;}
.err-msg{font-size:11px;color:#DC2626;margin-top:-10px;margin-bottom:10px;display:none;}
.pw-strength{height:4px;border-radius:2px;margin-top:-10px;margin-bottom:12px;background:#F3F4F6;overflow:hidden;}
.pw-bar{height:100%;border-radius:2px;transition:all .3s;width:0;}
.pw-hint{font-size:11px;color:#9CA3AF;margin-bottom:14px;}
/* ZENO v2: next-btn → navy */
.next-btn{width:100%;padding:12px;background:var(--navy);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .2s;}
.next-btn:hover{background:var(--navy-h);}
.next-btn:disabled{opacity:.5;cursor:not-allowed;}
.role-card{background:#F9FAFB;border:1.5px solid #E5E7EB;border-radius:12px;padding:14px 16px;margin-bottom:16px;}
.role-badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:3px 10px;border-radius:6px;margin-bottom:8px;}
.role-item{display:flex;align-items:center;gap:7px;font-size:12px;color:#6B7280;margin-bottom:5px;}
.role-item:last-child{margin-bottom:0;}
.role-item .ck{color:#059669;font-weight:700;}.role-item .xk{color:#D1D5DB;}
.success-icon{font-size:52px;text-align:center;margin-bottom:16px;animation:pop .4s ease;}
@keyframes pop{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.success-title{font-size:20px;font-weight:700;color:var(--navy);text-align:center;margin-bottom:8px;}
.success-sub{font-size:13px;color:#6B7280;text-align:center;line-height:1.7;margin-bottom:24px;}
</style>
</head><body>
<div class="wrap">
  <div class="card">
    <div class="logo">
      <div class="logo-title">Hospital Site OS</div>
      <div class="logo-sub">병원 관리자 포털</div>
      <div class="invite-badge" id="role-badge">🏥 올래성형외과에 초대되었습니다</div>
    </div>
    <div class="steps">
      <div class="step"><div class="step-circle active" id="c1">1</div><div class="step-label active" id="l1">정보 입력</div></div>
      <div class="step-line" id="line1"></div>
      <div class="step"><div class="step-circle idle" id="c2">2</div><div class="step-label" id="l2">비밀번호</div></div>
      <div class="step-line" id="line2"></div>
      <div class="step"><div class="step-circle idle" id="c3">3</div><div class="step-label" id="l3">완료</div></div>
    </div>
    <div class="section active" id="sec1">
      <div class="sec-title">안녕하세요! 👋</div>
      <div class="sec-sub">먼저 사용할 이름을 알려주세요.<br>초대받은 이메일은 로그인 아이디로 사용됩니다.</div>
      <label class="f-label">이름 <span style="color:#DC2626">*</span></label>
      <input class="f-input" id="inp-name" placeholder="예) 이수진" maxlength="20">
      <div class="err-msg" id="err-name">이름을 입력해주세요.</div>
      <label class="f-label">로그인 이메일 (아이디)</label>
      <input class="f-input" id="inp-email" value="staff@oleps.co.kr" readonly style="background:#F9FAFB;color:#9CA3AF;cursor:not-allowed;margin-bottom:6px">
      <div style="font-size:11px;color:#9CA3AF;margin-bottom:14px">초대받은 이메일로 고정됩니다.</div>
      <button class="next-btn" onclick="goStep2()">다음 →</button>
    </div>
    <div class="section" id="sec2">
      <div class="sec-title">비밀번호 설정</div>
      <div class="sec-sub">로그인에 사용할 비밀번호를 설정해주세요.</div>
      <label class="f-label">비밀번호 <span style="color:#DC2626">*</span></label>
      <input class="f-input" id="inp-pw" type="password" placeholder="8자 이상 입력" oninput="checkPwStrength(this.value)">
      <div class="pw-strength"><div class="pw-bar" id="pw-bar"></div></div>
      <div class="pw-hint" id="pw-hint">영문 + 숫자 조합 8자 이상을 권장합니다.</div>
      <label class="f-label">비밀번호 확인 <span style="color:#DC2626">*</span></label>
      <input class="f-input" id="inp-pw2" type="password" placeholder="비밀번호를 다시 입력">
      <div class="err-msg" id="err-pw">비밀번호가 일치하지 않습니다.</div>
      <div style="display:flex;gap:8px">
        <button onclick="goStep1()" style="flex:1;padding:12px;border:1.5px solid #E5E7EB;border-radius:10px;font-size:14px;font-family:inherit;cursor:pointer;background:#fff;color:#6B7280">← 이전</button>
        <button class="next-btn" style="flex:2" onclick="goStep3()">계정 생성</button>
      </div>
    </div>
    <div class="section" id="sec3">
      <div class="success-icon">🎉</div>
      <div class="success-title">계정 설정 완료!</div>
      <div class="success-sub">환영합니다, <strong id="welcome-name"></strong>님!<br>이제 Hospital Site OS를 사용할 수 있습니다.</div>
      <div class="role-card"><div class="role-badge" id="role-detail-badge"></div><div id="role-perms"></div></div>
      <button class="next-btn" onclick="goLogin()">🚀 로그인 하러 가기</button>
    </div>
  </div>
</div>
<script>
var params=new URLSearchParams(location.search);
var invRole=params.get('role')||'viewer';
var invEmail=params.get('email')||'staff@oleps.co.kr';
var roleInfo={
  admin:{label:'관리자',icon:'👑',badgeBg:'#EEF2FF',badgeColor:'#0D1B3E',perms:[{ok:true,txt:'모든 메뉴 접근'},{ok:true,txt:'설정 변경'},{ok:true,txt:'팀 멤버 관리'},{ok:true,txt:'콘텐츠 편집 · 게시'},{ok:true,txt:'리포트 조회'}]},
  editor:{label:'편집자',icon:'✏',badgeBg:'#EEF2FF',badgeColor:'#0D1B3E',perms:[{ok:true,txt:'대시보드 조회'},{ok:true,txt:'콘텐츠 편집'},{ok:true,txt:'CRM 인박스'},{ok:true,txt:'리포트 조회'},{ok:false,txt:'설정 변경 불가'},{ok:false,txt:'팀 관리 불가'}]},
  viewer:{label:'뷰어',icon:'👁',badgeBg:'#F3F4F6',badgeColor:'#6B7280',perms:[{ok:true,txt:'대시보드 조회'},{ok:true,txt:'리포트 조회'},{ok:false,txt:'콘텐츠 편집 불가'},{ok:false,txt:'설정 변경 불가'},{ok:false,txt:'팀 관리 불가'}]},
};
var ri=roleInfo[invRole];
document.getElementById('inp-email').value=invEmail;
function goStep1(){setStep(1);}
function goStep2(){var name=document.getElementById('inp-name').value.trim();var err=document.getElementById('err-name');if(!name){err.style.display='block';document.getElementById('inp-name').classList.add('error');return;}err.style.display='none';document.getElementById('inp-name').classList.remove('error');setStep(2);}
function goStep3(){var pw=document.getElementById('inp-pw').value;var pw2=document.getElementById('inp-pw2').value;var err=document.getElementById('err-pw');if(pw.length<8){err.textContent='비밀번호는 8자 이상이어야 합니다.';err.style.display='block';return;}if(pw!==pw2){err.textContent='비밀번호가 일치하지 않습니다.';err.style.display='block';return;}err.style.display='none';var name=document.getElementById('inp-name').value.trim();document.getElementById('welcome-name').textContent=name;var rb=document.getElementById('role-detail-badge');rb.textContent=ri.icon+' '+ri.label;rb.style.background=ri.badgeBg;rb.style.color=ri.badgeColor;rb.style.border='1px solid '+ri.badgeColor+'40';var rp=document.getElementById('role-perms');rp.innerHTML=ri.perms.map(function(p){return'<div class="role-item"><span class="'+(p.ok?'ck':'xk')+'">'+(p.ok?'✓':'✕')+'</span>'+p.txt+'</div>';}).join('');setStep(3);}
function setStep(n){[1,2,3].forEach(function(i){document.getElementById('sec'+i).classList.toggle('active',i===n);var c=document.getElementById('c'+i);var l=document.getElementById('l'+i);if(i<n){c.className='step-circle done';c.textContent='✓';l.className='step-label';}else if(i===n){c.className='step-circle active';l.className='step-label active';}else{c.className='step-circle idle';l.className='step-label';}if(i<3){document.getElementById('line'+i).className='step-line'+(i<n?' done':'');}});}
function checkPwStrength(pw){var bar=document.getElementById('pw-bar');var hint=document.getElementById('pw-hint');var score=0;if(pw.length>=8)score++;if(/[A-Za-z]/.test(pw))score++;if(/[0-9]/.test(pw))score++;if(/[^A-Za-z0-9]/.test(pw))score++;/* ZENO v2: amber 제거 → gray */var colors=['#DC2626','#9CA3AF','#2563EB','#059669'];var labels=['너무 짧습니다','보통','좋음','매우 안전'];if(pw.length===0){bar.style.width='0';hint.textContent='영문 + 숫자 조합 8자 이상을 권장합니다.';return;}bar.style.width=(score*25)+'%';bar.style.background=colors[score-1]||'#DC2626';hint.textContent=labels[score-1]||'';hint.style.color=colors[score-1]||'#DC2626';}
function goLogin(){var path=location.pathname.includes('/html/')?'../login.html':'login.html';location.href=path;}
</script>
</body></html>
