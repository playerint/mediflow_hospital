<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>퍼널·자동화 변경 이력 — Hospital Site OS</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
<link rel="stylesheet" href="../css/common.css"><link rel="stylesheet" href="../css/funnel.css">
<script src="../js/gate.js"></script>
</head><body>
<div id="sidebar-mount" data-active="funnel"></div>
<main class="main">
  <div class="topbar">
    <div class="topbar-left"><a class="topbar-back" href="hospital_funnel.html">← 퍼널·자동화</a><span style="color:var(--gray-300)">/</span><span class="topbar-title">변경 이력</span></div>
    <div class="topbar-right">
      <div class="filter-pills" style="margin:0">
        <button class="pill on" onclick="setFilter('all',this)">전체</button>
        <button class="pill" onclick="setFilter('cta',this)">CTA</button>
        <button class="pill" onclick="setFilter('retarget',this)">리타게팅</button>
        <button class="pill" onclick="setFilter('rule',this)">자동화 규칙</button>
        <button class="pill" onclick="setFilter('webhook',this)">웹훅</button>
      </div>
    </div>
  </div>
  <div class="content" style="max-width:780px">
    <div style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:20px">
      <div style="background:#fff;border:1px solid var(--gray-200);border-radius:var(--r);padding:12px 16px"><div style="font-size:12px;color:var(--gray-400);margin-bottom:4px">전체 변경</div><div style="font-size:22px;font-weight:700;color:var(--navy)">24회</div><div style="font-size:12px;color:var(--gray-400);margin-top:2px">최근 30일</div></div>
      <div style="background:#fff;border:1px solid var(--gray-200);border-radius:var(--r);padding:12px 16px"><div style="font-size:12px;color:var(--gray-400);margin-bottom:4px">롤백</div><div style="font-size:22px;font-weight:700;color:var(--navy)">2회</div><div style="font-size:12px;color:var(--gray-400);margin-top:2px">최근 30일</div></div>
      <div style="background:#fff;border:1px solid var(--gray-200);border-radius:var(--r);padding:12px 16px"><div style="font-size:12px;color:var(--gray-400);margin-bottom:4px">마지막 변경</div><div style="font-size:14px;font-weight:700;color:var(--navy);margin-top:4px">오늘 14:23</div><div style="font-size:12px;color:var(--gray-400);margin-top:2px">김지현</div></div>
      <div style="background:#fff;border:1px solid var(--gray-200);border-radius:var(--r);padding:12px 16px"><div style="font-size:12px;color:var(--gray-400);margin-bottom:4px">변경 멤버</div><div style="font-size:22px;font-weight:700;color:var(--navy)">2명</div><div style="font-size:12px;color:var(--gray-400);margin-top:2px">김지현, 이수진</div></div>
    </div>
    <div class="card"><div id="log-list"></div></div>
    <footer class="site-footer">© 2026 MEDIFLOW. All rights reserved.</footer>
  </div>
</main>
<script src="../js/auth.js"></script><script src="../js/sidebar.js"></script>
<script>
const logs=[
  {type:'retarget',date:'오늘',time:'14:23',who:'김지현',avatar:'김',ab:'#EEF2FF',ac:'#0D1B3E',action:'D+3 리타게팅 메시지 수정',detail:'마무리 문구 변경',tag:'리타게팅',tb:'#EFF6FF',tc:'#1E40AF',canRollback:true},
  {type:'cta',date:'오늘',time:'11:05',who:'김지현',avatar:'김',ab:'#EEF2FF',ac:'#0D1B3E',action:'CTA 버튼 순서 변경',detail:'LINE 상담 1위 유지',tag:'CTA',tb:'#D1FAE5',tc:'#065F46',canRollback:true},
  {type:'rule',date:'오늘',time:'09:30',who:'이수진',avatar:'이',ab:'#D1FAE5',ac:'#065F46',action:'자동화 규칙 추가',detail:'예약 D-1 → 리마인더 발송',tag:'자동화 규칙',tb:'#EEF2FF',tc:'#0D1B3E',canRollback:true},
  {type:'webhook',date:'어제',time:'14:10',who:'김지현',avatar:'김',ab:'#EEF2FF',ac:'#0D1B3E',action:'웹훅 URL 변경',detail:'https://old-crm → https://crm.example.com/webhook/oleps',tag:'웹훅',tb:'#F3F4F6',tc:'#374151',canRollback:true},
  {type:'retarget',date:'5월 15일',time:'09:00',who:'이수진',avatar:'이',ab:'#D1FAE5',ac:'#065F46',action:'D+3 메시지 롤백',detail:'클릭률 44%로 회복',tag:'롤백',tb:'#FEF2F2',tc:'#991B1B',canRollback:false},
];
let curFilter='all';
function render(filter){
  const el=document.getElementById('log-list');
  const filtered=filter==='all'?logs:logs.filter(l=>l.type===filter);
  const groups={};
  filtered.forEach(l=>{if(!groups[l.date])groups[l.date]=[];groups[l.date].push(l);});
  let html='';
  Object.entries(groups).forEach(([date,items])=>{
    html+=`<div style="font-size:12px;font-weight:600;color:var(--gray-400);letter-spacing:.05em;text-transform:uppercase;padding:10px 0 6px;border-bottom:1px solid var(--gray-200);margin-bottom:2px">${date}</div>`;
    items.forEach((l,i)=>{
      const id=date+'-'+i;
      html+=`<div style="display:flex;align-items:flex-start;gap:12px;padding:12px 4px;border-bottom:1px solid var(--gray-100);cursor:pointer" onclick="toggle('${id}',this)">
        <div style="width:32px;height:32px;border-radius:50%;background:${l.ab};color:${l.ac};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0">${l.avatar}</div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px">
            <span style="font-size:13px;font-weight:500;color:var(--gray-900)">${l.action}</span>
            <span style="font-size:10px;padding:2px 7px;border-radius:6px;background:${l.tb};color:${l.tc};flex-shrink:0">${l.tag}</span>
          </div>
          <div style="font-size:12px;color:var(--gray-400)">${l.who} · ${l.time}</div>
          <div id="detail-${id}" style="display:none;margin-top:8px;font-size:12px;color:var(--gray-600);background:var(--gray-50);padding:10px 12px;border-radius:var(--r);line-height:1.6">${l.detail}
            ${l.canRollback?`<div style="margin-top:8px"><button class="btn btn-danger" style="font-size:12px;padding:4px 10px" onclick="event.stopPropagation();rollback('${l.action}')">↺ 이 시점으로 롤백</button></div>`:'<div style="margin-top:6px;font-size:12px;color:var(--gray-400)">롤백 불가 항목</div>'}
          </div>
        </div>
        <div style="font-size:12px;color:var(--gray-300);margin-top:6px;flex-shrink:0" id="arrow-${id}">›</div>
      </div>`;
    });
  });
  if(!html) html='<div style="text-align:center;padding:40px;color:var(--gray-400);font-size:13px">해당 항목이 없습니다</div>';
  el.innerHTML=html;
}
function toggle(id,row){
  const detail=document.getElementById('detail-'+id);
  const arrow=document.getElementById('arrow-'+id);
  const isOpen=detail.style.display==='block';
  detail.style.display=isOpen?'none':'block';
  arrow.style.transform=isOpen?'':'rotate(90deg)';
  /* ZENO v2: arrow color → blue */
  arrow.style.color=isOpen?'var(--gray-300)':'var(--blue)';
}
function setFilter(f,btn){curFilter=f;document.querySelectorAll('.pill').forEach(p=>p.classList.remove('on'));btn.classList.add('on');render(f);}
function rollback(action){if(confirm('"'+action+'" 이전 버전으로 롤백하시겠습니까?')){alert('롤백이 완료되었습니다.');}}
render('all');
</script>
</body></html>
