<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>예약 관리 — Hospital Site OS</title>
<script src="../js/gate.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/common.css">
<link rel="stylesheet" href="../css/crm.css">
<style>
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px;}
.kpi-num{font-size:28px;font-weight:700;color:var(--navy);margin:6px 0 3px;letter-spacing:-.5px;}
.kpi-lbl{font-size:11px;color:var(--gray-400);}
.kpi-dl{font-size:11px;}
.cal-wrap{background:#fff;border:1px solid var(--gray-200);border-radius:var(--rl);padding:16px 18px;}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cal-title{font-size:13px;font-weight:600;color:var(--navy);}
.cal-btn{width:28px;height:28px;border-radius:8px;border:1px solid var(--gray-200);background:#fff;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;}
.day-cols{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.day-col{min-height:80px;}
.day-head{text-align:center;margin-bottom:6px;}
.day-name{font-size:10px;color:var(--gray-400);font-weight:500;}
.day-num{font-size:14px;font-weight:600;color:var(--gray-700);width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:2px auto;}
.day-num.today{background:var(--navy);color:#fff;}
.bk-chip{font-size:10px;padding:2px 5px;border-radius:5px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;}
.today-wrap{background:#fff;border:1px solid var(--gray-200);border-radius:var(--rl);padding:16px 18px;}
.today-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.today-title{font-size:13px;font-weight:600;color:var(--navy);}
.today-date{font-size:12px;color:var(--gray-400);}
.list-wrap{background:#fff;border:1px solid var(--gray-200);border-radius:var(--rl);margin-top:14px;overflow:hidden;}
.list-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--gray-100);}
.list-title{font-size:13px;font-weight:600;color:var(--navy);}
.table{width:100%;border-collapse:collapse;table-layout:fixed;}
.table th{font-size:11px;font-weight:600;color:var(--gray-400);text-align:left;padding:10px 14px;border-bottom:2px solid var(--gray-100);white-space:nowrap;text-transform:uppercase;letter-spacing:.04em;background:var(--gray-50);}
.table td{font-size:13px;color:var(--gray-700);padding:0 14px;height:48px;border-bottom:1px solid var(--gray-100);vertical-align:middle;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.table tr:last-child td{border-bottom:none;}
.table tbody tr:hover td{background:var(--gray-50);cursor:pointer;}
/* 컬럼 너비 고정 */
.table th:nth-child(1){width:60px;}
.table th:nth-child(2){width:70px;}
.table th:nth-child(3){width:120px;}
.table th:nth-child(4){width:140px;}
.table th:nth-child(5){width:80px;}
.table th:nth-child(6){width:130px;}
.table th:nth-child(7){width:90px;}
.table th:nth-child(8){width:70px;}
.table th:nth-child(9){width:60px;}
.badge{display:inline-flex;align-items:center;font-size:11px;padding:2px 8px;border-radius:6px;font-weight:500;}
</style>
</head>

        </div>

    </div>

    <!-- 전체 예약 리스트 -->
    <div class="list-wrap">

        <div style="display:flex;align-items:center;gap:8px">
          <div class="filter-pills" style="margin:0">

            <button class="pill" onclick="setBookingFilter('consult',this)">상담</button>
            <button class="pill" onclick="setBookingFilter('online',this)">비대면</button>
            <button class="pill" onclick="setBookingFilter('visit',this)">내원</button>
            <button class="pill" onclick="setBookingFilter('auto',this)">시술</button>
          </div>
          <button class="btn" style="font-size:12px" onclick="exportCSV('booking')">📥 CSV</button>
        </div>
      </div>
      <table class="table">

          </tr>
        </thead>

      </table>
    </div>


    <footer class="site-footer">© 2026 MEDIFLOW. All rights reserved.</footer>
  </div>
</main>

var TYPE_LABELS = {consult:'상담', online:'비대면', visit:'내원', auto:'시술'};
var TYPE_COLORS = {
  consult:{bg:'#EDE9FE',tc:'#4C1D95'},
  online: {bg:'#DBEAFE',tc:'#1E40AF'},
  visit:  {bg:'#D1FAE5',tc:'#065F46'},
  auto:   {bg:'#FEF3C7',tc:'#92400E'},
};
var TYPE_BG = {consult:'#CCFBF1',online:'#DBEAFE',visit:'#D1FAE5',auto:'#EDE9FE'};
var TYPE_TC2= {consult:'#0F766E',online:'#1E40AF',visit:'#065F46',auto:'#4C1D95'};

function renderBookingTable(filter) {
  var tbody = document.getElementById('booking-tbody');
  if (!tbody) return;
  var filtered = filter === 'all' ? ALL_BOOKINGS : ALL_BOOKINGS.filter(function(b){ return b.type === filter; });
  var rows = '';
  for (var i = 0; i < filtered.length; i++) {
    var b = filtered[i];
    var tc = TYPE_COLORS[b.type] || {bg:'#F3F4F6',tc:'#374151'};
    var lineHtml = b.line
      ? '<span style="color:#059669;font-size:13px">✓</span>'
      : '<span style="color:#D1D5DB;font-size:13px">—</span>';
    rows += '<tr onclick="alert(\'' + b.name + ' 예약 상세\')">';
    rows += '<td style="font-weight:500;color:#1A2642">' + b.date + '</td>';
    rows += '<td>' + b.time + '</td>';
    rows += '<td style="font-weight:500">' + b.name + '</td>';
    rows += '<td>' + b.proc + '</td>';
    rows += '<td><span class="badge" style="background:' + tc.bg + ';color:' + tc.tc + '">' + (TYPE_LABELS[b.type]||b.type) + '</span></td>';
    rows += '<td style="font-size:12px;color:#6B7280">' + b.doctor + '</td>';
    rows += '<td style="text-align:center">' + lineHtml + '</td>';
    rows += '<td><span class="badge" style="background:' + b.sbc + ';color:' + b.stc + '">' + b.status + '</span></td>';
    rows += '<td><button class="btn" style="font-size:11px;padding:3px 9px" onclick="event.stopPropagation();editBooking('+i+')">편집</button></td>';
    rows += '</tr>';
  }
  tbody.innerHTML = rows;
}

function setBookingFilter(f, btn) {
  document.querySelectorAll('.filter-pills .pill').forEach(function(p){ p.classList.remove('on'); });
  btn.classList.add('on');
  renderBookingTable(f);
}

// 캘린더
function renderCalendar() {
  var cal = document.getElementById('calendar');
  if (!cal) return;
  var days  = ['월','화','수','목','금','토','일'];
  var dates = ['18','19','20','21','22','23','24'];
  cal.innerHTML = '';
  for (var i = 0; i < days.length; i++) {
    var d = days[i];
    var dt = dates[i];
    var isToday = dt === '22';
    var chips = '';
    for (var j = 0; j < ALL_BOOKINGS.length; j++) {
      var b = ALL_BOOKINGS[j];
      if (b.date === '5/' + dt) {
        chips += '<div class="bk-chip" style="background:' + (TYPE_BG[b.type]||'#F3F4F6') + ';color:' + (TYPE_TC2[b.type]||'#374151') + '">' + b.time.split(':')[0] + '시 ' + b.name.split(' ')[0] + '</div>';
      }
    }
    var dayColor = d==='토' ? '#2563EB' : d==='일' ? '#DC2626' : '#9CA3AF';
    cal.innerHTML += '<div class="day-col"><div class="day-head"><div class="day-name" style="color:' + dayColor + '">' + d + '</div><div class="day-num' + (isToday?' today':'') + '">' + dt + '</div></div>' + chips + '</div>';
  }
}

// 오늘 일정
function renderToday() {
  var el = document.getElementById('today-list');
  if (!el) return;
  var todayBks = ALL_BOOKINGS.filter(function(b){ return b.date === '5/22'; });
  var html = '';
  for (var k = 0; k < todayBks.length; k++) {
    var tb = todayBks[k];
    html += '<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #F3F4F6">';
    html += '<div style="font-size:12px;font-weight:600;color:#1A2642;min-width:38px">' + tb.time + '</div>';
    html += '<div style="flex:1"><div style="font-size:13px;font-weight:500">' + tb.name + '</div><div style="font-size:11px;color:#9CA3AF">' + tb.proc + '</div></div>';
    html += '<span class="badge" style="background:' + (TYPE_BG[tb.type]||'#F3F4F6') + ';color:' + (TYPE_TC2[tb.type]||'#374151') + ';font-size:10px">' + (TYPE_LABELS[tb.type]||'') + '</span>';
    html += '</div>';
  }
  el.innerHTML = html || '<div style="font-size:12px;color:#9CA3AF;padding:10px 0">오늘 예약 없음</div>';
}

window.addEventListener('DOMContentLoaded', function() {
  renderCalendar();
  renderToday();
  renderBookingTable('all');
});

function showToast(msg, type) {
  var existing = document.getElementById('__toast');
  if (existing) existing.remove();
  var bg = type === 'success' ? '#059669' : type === 'error' ? '#DC2626' : '#1A2642';
  var t = document.createElement('div');
  t.id = '__toast';
  t.style.cssText = 'position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:'+bg+';color:#fff;padding:11px 22px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.2);z-index:9999;white-space:nowrap;animation:fadeUp .25s ease';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function(){ t.style.opacity='0'; t.style.transition='opacity .3s'; setTimeout(function(){ t.remove(); },300); }, 2500);
}

function openModal(title, bodyHtml, onConfirm, confirmLabel, confirmClass) {
  var existing = document.getElementById('__modal');
  if (existing) existing.remove();
  var m = document.createElement('div');
  m.id = '__modal';
  m.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9000;display:flex;align-items:center;justify-content:center';
  m.innerHTML = '<div style="background:#fff;border-radius:16px;padding:28px 32px;width:100%;max-width:460px;box-shadow:0 20px 60px rgba(0,0,0,.2)">'
    + '<div style="font-size:16px;font-weight:700;color:#1A2642;margin-bottom:14px">'+title+'</div>'
    + '<div style="font-size:13px;color:#374151;line-height:1.7;margin-bottom:20px">'+bodyHtml+'</div>'
    + '<div style="display:flex;gap:8px;justify-content:flex-end">'
    + '<button class="btn" onclick="closeModal()">취소</button>'
    + '<button class="btn '+(confirmClass||'btn-primary')+'" id="__modal-confirm">'+(confirmLabel||'확인')+'</button>'
    + '</div></div>';
  m.addEventListener('click', function(e){ if(e.target===m) closeModal(); });
  document.body.appendChild(m);
  document.getElementById('__modal-confirm').addEventListener('click', function(){
    closeModal();
    if (typeof onConfirm === 'function') onConfirm();
  });
}
function closeModal(){ var m=document.getElementById('__modal'); if(m) m.remove(); }

var _lastFiltered = [];
function exportCSV(type) {
  showToast('📥 CSV 파일을 다운로드합니다...', '');
  setTimeout(function(){
    var rows = '날짜,시간,환자명,시술,유형,담당 의사,LINE 발송,상태\n';
    var data = _lastFiltered.length ? _lastFiltered : ALL_BOOKINGS;
    for(var i=0;i<data.length;i++){
      var b=data[i];
      rows += [b.date,b.time,b.name,b.proc,TYPE_LABELS[b.type],b.doctor,b.line?'O':'X',b.status].join(',')+'\n';
    }
    var a=document.createElement('a');
    a.href='data:text/csv;charset=utf-8,'+encodeURIComponent('\uFEFF'+rows);
    a.download='bookings.csv'; a.click();
    showToast('✓ CSV 다운로드 완료', 'success');
  }, 600);
}
function showBookingDetail(idx) {
  var b = ALL_BOOKINGS[idx];
  if (!b) return;
  var tc = TYPE_COLORS[b.type]||{bg:'#F3F4F6',tc:'#374151'};
  var body = '<table style="width:100%;border-collapse:collapse">'
    + makeRow('환자명', b.name)
    + makeRow('날짜·시간', b.date + ' ' + b.time)
    + makeRow('시술', b.proc)
    + makeRow('유형', '<span style="background:'+tc.bg+';color:'+tc.tc+';padding:2px 8px;border-radius:6px;font-size:12px">'+(TYPE_LABELS[b.type]||b.type)+'</span>')
    + makeRow('담당 의사', b.doctor)
    + makeRow('LINE 발송', b.line ? '✓ 발송 완료' : '미발송')
    + makeRow('상태', '<span style="background:'+b.sbc+';color:'+b.stc+';padding:2px 8px;border-radius:6px;font-size:12px">'+b.status+'</span>')
    + '</table>';
  openModal('📋 예약 상세 — ' + b.name, body, null, '닫기', 'btn-primary');
}
function makeRow(label, val) {
  return '<tr><td style="font-size:12px;color:#9CA3AF;padding:6px 0;width:90px">'+label+'</td><td style="font-size:13px;color:#374151;padding:6px 0">'+val+'</td></tr>';
}
function editBooking(idx) {
  var b = ALL_BOOKINGS[idx];
  if (!b) return;
  var body = '<div style="margin-bottom:10px"><label style="font-size:12px;font-weight:600;color:#374151;display:block;margin-bottom:4px">환자명</label>'
    + '<input style="width:100%;padding:8px 12px;border:1.5px solid #E5E7EB;border-radius:8px;font-size:13px;font-family:inherit" value="'+b.name+'" id="edit-name"></div>'
    + '<div style="margin-bottom:10px"><label style="font-size:12px;font-weight:600;color:#374151;display:block;margin-bottom:4px">시술</label>'
    + '<input style="width:100%;padding:8px 12px;border:1.5px solid #E5E7EB;border-radius:8px;font-size:13px;font-family:inherit" value="'+b.proc+'" id="edit-proc"></div>'
    + '<div><label style="font-size:12px;font-weight:600;color:#374151;display:block;margin-bottom:4px">상태</label>'
    + '<select style="width:100%;padding:8px 12px;border:1.5px solid #E5E7EB;border-radius:8px;font-size:13px;font-family:inherit" id="edit-status">'
    + ['대기','확정','완료','취소'].map(function(s){ return '<option'+(s===b.status?' selected':'')+'>'+s+'</option>'; }).join('')
    + '</select></div>';
  openModal('✏ 예약 편집 — ' + b.name, body, function(){
    ALL_BOOKINGS[idx].name   = document.getElementById('edit-name')  ? document.getElementById('edit-name').value   : b.name;
    ALL_BOOKINGS[idx].proc   = document.getElementById('edit-proc')  ? document.getElementById('edit-proc').value   : b.proc;
    var st = document.getElementById('edit-status') ? document.getElementById('edit-status').value : b.status;
    ALL_BOOKINGS[idx].status = st;
    ALL_BOOKINGS[idx].sbc = st==='확정'?'#D1FAE5':st==='완료'?'#EDE9FE':st==='취소'?'#FEE2E2':'#FEF3C7';
    ALL_BOOKINGS[idx].stc = st==='확정'?'#065F46':st==='완료'?'#4C1D95':st==='취소'?'#991B1B':'#92400E';
    renderBookingTable('all');
    document.querySelectorAll('.filter-pills .pill').forEach(function(p){ p.classList.remove('on'); });
    document.querySelector('.filter-pills .pill').classList.add('on');
    showToast('✓ 예약이 수정되었습니다.', 'success');
  }, '저장', 'btn-primary');
}
