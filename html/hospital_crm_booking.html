<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>예약 관리 — Hospital Site OS</title>
<script src="../js/gate.js"></script>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
<link rel="stylesheet" href="../css/common.css">
<link rel="stylesheet" href="../css/crm.css">
<style>
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px;}
.kpi-num{font-size:28px;font-weight:700;color:var(--navy);margin:6px 0 3px;letter-spacing:-.5px;}
.kpi-lbl{font-size:12px;color:var(--gray-400);}
.kpi-dl{font-size:12px;}
.cal-wrap{background:#fff;border:1px solid var(--gray-200);border-radius:var(--rl);padding:16px 18px;}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cal-title{font-size:13px;font-weight:600;color:var(--navy);}
.cal-btn{width:28px;height:28px;border-radius:8px;border:1px solid var(--gray-200);background:#fff;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;}
.day-cols{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.day-col{min-height:80px;}
.day-head{text-align:center;margin-bottom:6px;}
.day-name{font-size:10px;color:var(--gray-400);font-weight:500;}
.day-num{font-size:14px;font-weight:600;color:var(--gray-700);width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:2px auto;}
.day-num.today{background:var(--navy);color:#fff;}
.bk-chip{font-size:10px;padding:2px 5px;border-radius:5px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;}
.today-wrap{background:#fff;border:1px solid var(--gray-200);border-radius:var(--rl);padding:16px 18px;}
.today-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.today-title{font-size:13px;font-weight:600;color:var(--navy);}
.today-date{font-size:12px;color:var(--gray-400);}
.list-wrap{background:#fff;border:1px solid var(--gray-200);border-radius:var(--rl);margin-top:14px;overflow:hidden;}
.list-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--gray-100);}
.list-title{font-size:13px;font-weight:600;color:var(--navy);}
.table{width:100%;border-collapse:collapse;table-layout:fixed;}
.table th{font-size:12px;font-weight:600;color:var(--gray-400);text-align:left;padding:10px 14px;border-bottom:2px solid var(--gray-100);white-space:nowrap;text-transform:uppercase;letter-spacing:.04em;background:var(--gray-50);}
.table td{font-size:13px;color:var(--gray-700);padding:0 14px;height:48px;border-bottom:1px solid var(--gray-100);vertical-align:middle;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.table tr:last-child td{border-bottom:none;}
.table tbody tr:hover td{background:var(--gray-50);cursor:pointer;}
.table th:nth-child(1){width:60px;}.table th:nth-child(2){width:70px;}.table th:nth-child(3){width:120px;}
.table th:nth-child(4){width:140px;}.table th:nth-child(5){width:80px;}.table th:nth-child(6){width:130px;}
.table th:nth-child(7){width:90px;}.table th:nth-child(8){width:70px;}.table th:nth-child(9){width:60px;}
.badge{display:inline-flex;align-items:center;font-size:12px;padding:2px 8px;border-radius:6px;font-weight:500;}
/* ── 예약 등록 모달 ── */
.bk-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9000;display:flex;align-items:flex-start;justify-content:center;padding:24px 16px;overflow-y:auto;}
.bk-modal{background:#fff;border-radius:16px;width:100%;max-width:640px;max-height:90vh;margin:auto;box-shadow:0 20px 60px rgba(0,0,0,.25);display:flex;flex-direction:column;position:relative;}
.bk-fade{position:absolute;left:0;right:0;bottom:62px;height:64px;background:linear-gradient(transparent,rgba(255,255,255,.97));pointer-events:none;transition:opacity .25s;border-radius:0 0 0 0;}
.bk-modal-head{padding:20px 24px;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.bk-modal-body{padding:20px 24px;overflow-y:auto;flex:1;}
.bk-modal-foot{padding:16px 24px;border-top:1px solid var(--gray-100);display:flex;justify-content:flex-end;gap:8px;flex-shrink:0;}
.bk-section{background:#fff;border:1px solid var(--s200);border-radius:var(--rl);padding:18px 20px;margin-bottom:14px;}
.bk-section-title{font-size:13px;font-weight:600;color:var(--navy);margin-bottom:16px;}
.bk-grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.bk-field{margin-bottom:12px;}.bk-field:last-child{margin-bottom:0;}
.bk-label{font-size:12px;font-weight:500;color:var(--gray-700);margin-bottom:5px;}
.bk-input{width:100%;padding:8px 12px;border:1px solid var(--s200);border-radius:var(--r);font-size:13px;font-family:inherit;outline:none;color:var(--gray-700);background:#fff;}
.bk-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.08);}
.bk-select{width:100%;padding:8px 12px;border:1px solid var(--s200);border-radius:var(--r);font-size:13px;font-family:inherit;outline:none;color:var(--gray-700);background:#fff;}
.bk-select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.08);}
.bk-textarea{width:100%;padding:8px 12px;border:1px solid var(--s200);border-radius:var(--r);font-size:13px;font-family:inherit;outline:none;color:var(--gray-700);background:#fff;resize:vertical;line-height:1.6;}
.bk-textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.08);}
.bk-patient-wrap{position:relative;}
.bk-patient-result{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid var(--s200);border-radius:var(--r);box-shadow:0 4px 16px rgba(0,0,0,.08);z-index:10;margin-top:3px;display:none;}
.bk-patient-item{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--s100);}
.bk-patient-item:last-child{border-bottom:none;}
.bk-patient-item:hover{background:var(--s50);}
.bk-p-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;}
.bk-sel-patient{display:none;align-items:center;gap:10px;padding:10px 12px;background:var(--navy-l);border:1px solid var(--blue);border-radius:var(--r);margin-top:6px;}
.bk-time-slots{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:6px;}
.bk-time-slot{padding:7px 4px;text-align:center;border:1px solid var(--s200);border-radius:var(--r);font-size:12px;cursor:pointer;color:var(--gray-600);transition:all .15s;background:#fff;}
.bk-time-slot:hover{border-color:var(--blue);color:var(--blue);}
.bk-time-slot.on{background:var(--navy);border-color:var(--navy);color:#fff;font-weight:500;}
.bk-time-slot.off{background:var(--s100);color:var(--s300);cursor:not-allowed;pointer-events:none;}
.bk-send-check{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--s50);border-radius:var(--r);font-size:12px;color:var(--gray-700);cursor:pointer;}
.bk-send-check input{width:14px;height:14px;accent-color:var(--navy);}
</style>
</head>
<body>
<div id="sidebar-mount" data-active="booking"></div>
<main class="main">
  <div class="topbar">
    <div class="topbar-left">
      <a class="topbar-back" href="../index.html">← 대시보드</a>
      <span class="topbar-sep">/</span>
      <span class="topbar-title">예약 관리</span>
    </div>
    <div class="topbar-right">
      <a class="btn" href="hospital_crm_inbox.html">← CRM 인박스</a>
      <button class="btn btn-primary" onclick="openBookingModal()">+ 예약 등록</button>
    </div>
  </div>
  <div class="content">

    <!-- KPI — 동적 렌더링 (crm_booking.js renderKPI) -->
    <div class="kpi-grid" id="kpi-grid"></div>

    <div class="grid2">
      <div class="cal-wrap">
        <div class="cal-nav">
          <button class="cal-btn" onclick="shiftWeek(-1)">‹</button>
          <div class="cal-title" id="cal-week-title"></div>
          <button class="cal-btn" onclick="shiftWeek(1)">›</button>
        </div>
        <div class="day-cols" id="calendar"></div>
      </div>
      <div class="today-wrap">
        <div class="today-head">
          <div class="today-title">오늘 일정</div>
          <div class="today-date" id="today-date"></div>
        </div>
        <div id="today-list"></div>
      </div>
    </div>

    <div class="list-wrap">
      <div class="list-head">
        <div class="list-title">전체 예약 리스트</div>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="filter-pills" style="margin:0">
            <button class="pill on" onclick="setBookingFilter('all',this)">전체</button>
            <button class="pill" onclick="setBookingFilter('consult',this)">상담</button>
            <button class="pill" onclick="setBookingFilter('online',this)">비대면</button>
            <button class="pill" onclick="setBookingFilter('visit',this)">내원</button>
            <button class="pill" onclick="setBookingFilter('auto',this)">시술</button>
          </div>
          <button class="btn" style="font-size:12px" onclick="exportCSV()">📥 CSV</button>
        </div>
      </div>
      <table class="table">
        <thead>
          <tr><th>날짜</th><th>시간</th><th>환자명</th><th>시술</th><th>유형</th><th>담당 의사</th><th>LINE 발송</th><th>상태</th><th></th></tr>
        </thead>
        <tbody id="booking-tbody"></tbody>
      </table>
    </div>
    <footer class="site-footer">© 2026 MEDIFLOW. All rights reserved.</footer>
  </div>
</main>

<script src="../js/auth.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/booking-data.js"></script>
<script src="../js/crm_booking.js"></script>
<script>
/* 주간 이동 (데모용: weekOffset으로 상대 이동) */
var _weekOffset = 0;
var _origGetCurrentWeekDays = getCurrentWeekDays;
getCurrentWeekDays = function() {
  var days = _origGetCurrentWeekDays();
  if (_weekOffset === 0) return days;
  return days.map(function(d) {
    var parts = d.dateKey.split('/');
    var dt = new Date(2026, parseInt(parts[0]) - 1, parseInt(parts[1]));
    dt.setDate(dt.getDate() + _weekOffset * 7);
    var dayNames = ['월','화','수','목','금','토','일'];
    var dow = dt.getDay();
    var adjustedDow = (dow === 0) ? 6 : dow - 1;
    var today = new Date();
    today.setHours(0,0,0,0);
    return {
      dayName: dayNames[adjustedDow],
      dateKey: (dt.getMonth()+1) + '/' + dt.getDate(),
      dateNum: String(dt.getDate()),
      isToday: dt.toDateString() === today.toDateString(),
      isSat: adjustedDow === 5,
      isSun: adjustedDow === 6,
    };
  });
};
function shiftWeek(dir) {
  _weekOffset += dir;
  renderCalendar();
}
</script>
</body>
</html>
