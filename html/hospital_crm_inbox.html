<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>문의·상담 CRM — Hospital Site OS</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
<link rel="stylesheet" href="../css/common.css">
<link rel="stylesheet" href="../css/crm.css">
<script src="../js/gate.js"></script>
<style>
/* ── 메시지 말풍선 ── */
.msg-ja{font-size:13px;line-height:1.7;color:inherit;}
.msg-ko-badge{margin-top:6px;padding:5px 8px;background:rgba(255,255,255,.5);border-radius:6px;font-size:11px;color:#374151;line-height:1.6;border-left:2px solid rgba(0,0,0,.1);}
.msg-ko-send{font-size:13px;line-height:1.7;color:inherit;}
.msg-ja-send{margin-top:6px;padding:5px 8px;background:rgba(255,255,255,.25);border-radius:6px;font-size:11px;line-height:1.6;border-left:2px solid rgba(255,255,255,.5);}
.msg-av-hana{flex-shrink:0;display:flex;align-items:flex-start;}
.hana-badge-av{width:34px;height:34px;border-radius:50%;background:var(--navy-l);font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.hana-name{font-size:11px;font-weight:600;color:var(--navy);margin-bottom:4px;display:flex;align-items:center;gap:5px;}
.hana-name::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--blue);}
.hana-badge-mini{width:22px;height:22px;border-radius:50%;background:var(--navy-l);font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* ── 우측 패널 공통 ── */
.rp-section{padding:14px 16px;border-bottom:1px solid var(--gray-100);}
.rp-section:last-child{border-bottom:none;}
.rp-title{font-size:11px;font-weight:700;color:var(--gray-400);letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
.rp-tab-bar{display:flex;gap:2px;background:var(--gray-100);border-radius:8px;padding:2px;margin-bottom:12px;}
.rp-tab{flex:1;padding:5px 0;font-size:11px;font-weight:500;text-align:center;border:none;background:transparent;border-radius:6px;cursor:pointer;color:var(--gray-500);transition:all .15s;font-family:inherit;}
.rp-tab.active{background:#fff;color:var(--navy);font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,.08);}

/* ── 고객 프로필 카드 ── */
.profile-card{padding:16px;}
.pc-top{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.pc-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0;}
.pc-name{font-size:14px;font-weight:700;color:var(--navy);}
.pc-name-ja{font-size:11px;color:var(--gray-400);margin-top:2px;}
.pc-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;margin-top:4px;}
.pc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.pc-item{background:var(--gray-50);border-radius:8px;padding:8px 10px;}
.pc-item-label{font-size:10px;color:var(--gray-400);margin-bottom:2px;letter-spacing:.03em;}
.pc-item-value{font-size:12px;font-weight:600;color:var(--gray-900);}
.pc-history{font-size:12px;color:var(--gray-600);line-height:1.7;}
.pc-history-item{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--gray-100);}
.pc-history-item:last-child{border-bottom:none;}
.pc-history-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.pc-action-row{display:flex;gap:6px;margin-top:12px;}

/* ── AI 추천 답변 ── */
.ai-suggest-item{border:1px solid var(--gray-200);border-radius:10px;padding:10px 12px;margin-bottom:8px;cursor:pointer;transition:all .15s;}
.ai-suggest-item:hover{border-color:var(--blue);background:var(--blue-l);}
.ai-suggest-item.selected{border-color:var(--navy);background:var(--navy-l);}
.ai-suggest-tone{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;margin-bottom:6px;display:inline-block;}
.ai-suggest-text{font-size:12px;color:var(--gray-700);line-height:1.6;}
.ai-suggest-ja{font-size:11px;color:var(--gray-400);margin-top:4px;line-height:1.5;padding-top:4px;border-top:1px dashed var(--gray-200);}

/* ── 시술 매뉴얼 ── */
.manual-item{padding:10px 12px;border-radius:10px;background:var(--gray-50);margin-bottom:8px;}
.manual-item-title{font-size:12px;font-weight:600;color:var(--navy);margin-bottom:4px;display:flex;align-items:center;gap:6px;}
.manual-item-body{font-size:11px;color:var(--gray-600);line-height:1.7;}
.manual-badge{font-size:10px;padding:1px 6px;border-radius:4px;font-weight:500;}

/* ── 번역 패널 ── */
.trans-row{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;}
.trans-label{font-size:10px;font-weight:600;color:var(--gray-400);letter-spacing:.04em;}
.trans-box{background:var(--gray-50);border-radius:8px;padding:9px 11px;font-size:12px;line-height:1.7;color:var(--gray-800);}
.trans-box.ja{background:var(--navy-l);color:var(--navy);}
.trans-copy{font-size:10px;color:var(--blue);cursor:pointer;margin-top:3px;text-align:right;}
</style>
</head>
<body>
<div id="sidebar-mount" data-active="crm"></div>
<main class="main">
  <div class="topbar">
    <div class="topbar-left">
      <a class="topbar-back" href="../index.html">← 대시보드</a>
      <span style="color:var(--gray-300)">/</span>
      <span class="topbar-title">문의·상담 CRM</span>
    </div>
    <div class="topbar-right">
      <button class="btn" onclick="location.href='hospital_crm_booking.html'">📅 예약 관리</button>
      <button class="btn btn-primary" onclick="location.href='hospital_funnel.html'">⚡ 리타게팅</button>
    </div>
  </div>
  <div class="content">
    <!-- KPI -->
    <div class="kpi-grid" style="grid-template-columns:repeat(4,minmax(0,1fr));margin-bottom:12px">
      <div style="background:var(--gray-50);border-radius:var(--r);padding:10px 14px"><div style="font-size:11px;color:var(--gray-400);margin-bottom:3px">전체 문의</div><div style="font-size:18px;font-weight:700;color:var(--navy)">23건</div><div class="up" style="font-size:11px">↑ +8 전월</div></div>
      <div style="background:var(--gray-50);border-radius:var(--r);padding:10px 14px"><div style="font-size:11px;color:var(--gray-400);margin-bottom:3px">미확인</div><div style="font-size:18px;font-weight:700;color:var(--red)">3건</div><div style="font-size:11px;color:var(--red)">최대 2시간 경과</div></div>
      <div style="background:var(--gray-50);border-radius:var(--r);padding:10px 14px"><div style="font-size:11px;color:var(--gray-400);margin-bottom:3px">예약 전환</div><div style="font-size:18px;font-weight:700;color:var(--navy)">8건</div><div class="neu" style="font-size:11px">전환율 34.8%</div></div>
      <div style="background:var(--gray-50);border-radius:var(--r);padding:10px 14px"><div style="font-size:11px;color:var(--gray-400);margin-bottom:3px">AI 자동 해결</div><div style="font-size:18px;font-weight:700;color:var(--navy)">14건</div><div class="neu" style="font-size:11px">60.9%</div></div>
    </div>

    <!-- 메인 3열 레이아웃 -->
    <div class="layout-crm-3col">

      <!-- ① 좌측: 상담 목록 -->
      <div class="inbox-panel">
        <div class="inbox-head">
          <input class="inbox-search" placeholder="환자 이름·시술·채널 검색..." oninput="filterList(this.value)">
          <div class="filter-pills" style="margin-top:8px">
            <button class="pill on" onclick="setFilter('all',this)">전체 23</button>
            <button class="pill" onclick="setFilter('new',this)">신규 3</button>
            <button class="pill" onclick="setFilter('consulting',this)">상담중 6</button>
            <button class="pill" onclick="setFilter('booked',this)">예약완료 8</button>
            <button class="pill" onclick="setFilter('closed',this)">종료 6</button>
          </div>
        </div>
        <div class="inbox-list" id="inbox-list"></div>
      </div>

      <!-- ② 중앙: 채팅창 -->
      <div class="detail-panel">
        <div class="detail-head">
          <div class="dh-left">
            <div class="dh-avatar" id="d-avatar" style="background:#EEF2FF;color:#0D1B3E">야마</div>
            <div>
              <div class="dh-name" id="d-name">야마다 사오리 (山田 沙織)</div>
              <div class="dh-meta" id="d-meta">LINE · 오늘 10:23 · 2시간 경과</div>
            </div>
          </div>
          <div class="dh-actions">
            <button class="btn" style="font-size:12px" onclick="location.href='hospital_crm_booking.html'">📅 예약 전환</button>
            <button class="btn btn-primary" style="font-size:12px" id="status-btn" onclick="changeStatus()">상담중으로 변경</button>
          </div>
        </div>
        <div class="msg-area" id="msg-area"></div>
        <div class="ai-draft" id="ai-draft">
          <div class="ai-draft-head">
            <div style="display:flex;align-items:center;gap:8px">
              <div class="hana-badge-mini">🌸</div>
              <span style="font-size:13px;font-weight:600;color:var(--navy)">AI はな 답변 초안</span>
            </div>
            <div style="display:flex;gap:5px">
              <button id="translate-toggle" onclick="toggleTranslation()" style="font-size:11px;padding:3px 10px;border-radius:8px;border:1px solid var(--blue);background:var(--blue-l);color:var(--blue);cursor:pointer;font-family:inherit">🇰🇷 번역 ON</button>
              <button class="btn" style="font-size:11px;padding:3px 9px" onclick="regenDraft()">↺ 재생성</button>
            </div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;padding:0 14px 10px;gap:8px">
            <div>
              <div style="font-size:11px;font-weight:600;color:#6B7280;margin-bottom:4px">🇰🇷 한국어 입력</div>
              <textarea id="draft-text-ko" rows="3" oninput="onKoInput()" style="width:100%;padding:8px 10px;border:1.5px solid #E5E7EB;border-radius:8px;font-size:13px;font-family:inherit;resize:none;outline:none;line-height:1.7" onfocus="this.style.borderColor='#2563EB'" onblur="this.style.borderColor='#E5E7EB'" placeholder="한국어로 답변 입력..."></textarea>
            </div>
            <div>
              <div style="font-size:11px;font-weight:600;color:#6B7280;margin-bottom:4px">🇯🇵 일본어 발송</div>
              <textarea id="draft-text-ja" rows="3" style="width:100%;padding:8px 10px;border:1.5px solid #E5E7EB;border-radius:8px;font-size:13px;font-family:inherit;resize:none;outline:none;line-height:1.7;background:#F9FAFB" onfocus="this.style.borderColor='#2563EB';this.style.background='#fff'" onblur="this.style.borderColor='#E5E7EB'" placeholder="일본어 번역 결과..."></textarea>
            </div>
          </div>
          <div class="ai-draft-footer">
            <button class="btn" onclick="document.getElementById('ai-draft').style.display='none'">취소</button>
            <button class="send-btn" onclick="sendMsg()">📤 LINE으로 발송</button>
          </div>
        </div>
      </div>

      <!-- ③ 우측: 멀티 패널 -->
      <div class="right-panel">

        <!-- 고객 프로필 카드 -->
        <div class="rp-section" style="padding:0">
          <div class="profile-card">
            <div class="pc-top">
              <div class="pc-avatar" id="rp-avatar" style="background:#EEEDFE;color:#3C3489">야마</div>
              <div style="flex:1;min-width:0">
                <div class="pc-name" id="rp-name">야마다 사오리</div>
                <div class="pc-name-ja" id="rp-name-ja">山田 沙織</div>
                <div id="rp-status-badge"></div>
              </div>
              <button class="btn" style="font-size:11px;padding:4px 10px;flex-shrink:0" onclick="location.href='hospital_crm_booking.html'">📅 예약</button>
            </div>
            <div class="pc-grid">
              <div class="pc-item"><div class="pc-item-label">관심 시술</div><div class="pc-item-value" id="rp-proc">쌍꺼풀</div></div>
              <div class="pc-item"><div class="pc-item-label">접점 채널</div><div class="pc-item-value" id="rp-ch">LINE</div></div>
              <div class="pc-item"><div class="pc-item-label">문의 경과</div><div class="pc-item-value" id="rp-el" style="color:var(--red)">2시간</div></div>
              <div class="pc-item"><div class="pc-item-label">방문 이력</div><div class="pc-item-value" id="rp-visit">첫 방문</div></div>
            </div>
            <div id="rp-history-wrap"></div>
            <div class="pc-action-row">
              <button class="btn" style="flex:1;justify-content:center;font-size:11px" onclick="showToastInbox('📝 메모가 저장되었습니다.')">📝 메모</button>
              <button class="btn" style="flex:1;justify-content:center;font-size:11px" onclick="showToastInbox('⭐ 즐겨찾기에 추가되었습니다.')">⭐ 즐겨찾기</button>
              <button class="btn btn-primary" style="flex:1;justify-content:center;font-size:11px" id="rp-status-btn" onclick="changeStatus()">상담중으로</button>
            </div>
          </div>
        </div>

        <!-- 탭: AI 추천 / 시술 매뉴얼 / 번역 -->
        <div style="padding:12px 16px 0">
          <div class="rp-tab-bar">
            <button class="rp-tab active" onclick="setRpTab('ai',this)">🤖 AI 추천</button>
            <button class="rp-tab" onclick="setRpTab('manual',this)">📋 시술</button>
            <button class="rp-tab" onclick="setRpTab('trans',this)">🌐 번역</button>
          </div>
        </div>

        <!-- AI 추천 답변 탭 -->
        <div class="rp-section" id="rp-tab-ai" style="padding-top:0">
          <div id="ai-suggests"></div>
          <button class="btn" style="width:100%;justify-content:center;font-size:12px;margin-top:4px" onclick="regenSuggests()">↺ 답변 재생성</button>
        </div>

        <!-- 시술 매뉴얼 탭 -->
        <div class="rp-section" id="rp-tab-manual" style="display:none;padding-top:0">
          <div id="manual-content"></div>
        </div>

        <!-- 번역 탭 -->
        <div class="rp-section" id="rp-tab-trans" style="display:none;padding-top:0">
          <div id="trans-content"></div>
        </div>

      </div>
    </div>
    <footer class="site-footer" style="margin-top:12px">© 2026 MEDIFLOW. All rights reserved.</footer>
  </div>
</main>

<script src="../js/auth.js"></script>
<script src="../js/sidebar.js"></script>
<script>
/* ── 상태 변경 ── */
function changeStatus() {
  var btn = document.getElementById('status-btn');
  var rpBtn = document.getElementById('rp-status-btn');
  if (btn.textContent.trim() === '상담중으로 변경' || btn.textContent.trim() === '상담중으로') {
    btn.textContent = '✓ 상담중'; btn.style.background = 'var(--green)'; btn.style.borderColor = 'var(--green)';
    if(rpBtn){ rpBtn.textContent='✓ 상담중'; rpBtn.style.background='var(--green)'; rpBtn.style.borderColor='var(--green)'; }
    showToastInbox('상태가 상담중으로 변경되었습니다.');
  }
}
function showToastInbox(msg) {
  var e = document.getElementById('inbox-toast'); if(e) e.remove();
  var t = document.createElement('div'); t.id='inbox-toast';
  t.style.cssText='position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:11px 20px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.2);z-index:2000;white-space:nowrap';
  t.textContent=msg; document.body.appendChild(t);
  setTimeout(function(){ t.style.opacity='0'; t.style.transition='opacity .3s'; setTimeout(function(){ t.remove(); },300); },2500);
}

/* ── 우측 패널 탭 전환 ── */
function setRpTab(tab, btn) {
  document.querySelectorAll('.rp-tab').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  document.getElementById('rp-tab-ai').style.display = tab==='ai' ? '' : 'none';
  document.getElementById('rp-tab-manual').style.display = tab==='manual' ? '' : 'none';
  document.getElementById('rp-tab-trans').style.display = tab==='trans' ? '' : 'none';
}

/* ── 우측 패널 업데이트 ── */
function updateRightPanel(p) {
  // 프로필 카드
  var av = document.getElementById('rp-avatar');
  av.textContent = p.init; av.style.background = p.bg; av.style.color = p.tc;
  document.getElementById('rp-name').textContent = p.name;
  document.getElementById('rp-name-ja').textContent = p.nameJa;
  document.getElementById('rp-proc').textContent = p.proc;
  document.getElementById('rp-ch').textContent = p.ch;
  document.getElementById('rp-el').textContent = p.elapsed || '—';
  document.getElementById('rp-el').style.color = p.elapsed ? 'var(--red)' : 'var(--gray-700)';

  // 방문 이력
  var historyMap = {new:'첫 방문', consulting:'상담 이력 있음', booked:'예약 완료', closed:'시술 완료'};
  document.getElementById('rp-visit').textContent = historyMap[p.status] || '첫 방문';

  // 상태 배지
  var sc = {new:{bg:'#FEF2F2',tc:'#991B1B',label:'신규'}, consulting:{bg:'#F3F4F6',tc:'#374151',label:'상담중'}, booked:{bg:'#D1FAE5',tc:'#065F46',label:'예약완료'}, closed:{bg:'#F3F4F6',tc:'#6B7280',label:'종료'}};
  var s = sc[p.status] || sc.new;
  document.getElementById('rp-status-badge').innerHTML = '<span class="pc-badge" style="background:'+s.bg+';color:'+s.tc+'">'+s.label+'</span>';

  // 상담 이력
  var hw = document.getElementById('rp-history-wrap');
  if (p.msgs && p.msgs.length > 1) {
    hw.innerHTML = '<div style="font-size:11px;font-weight:600;color:var(--gray-400);letter-spacing:.04em;margin-bottom:6px">대화 이력 '+p.msgs.length+'건</div>'
      + p.msgs.slice(-2).map(function(m){
        var isP = m.from==='patient';
        return '<div class="pc-history-item"><div class="pc-history-dot" style="background:'+(isP?'var(--gray-400)':'+'var(--blue)')+'"></div><div style="flex:1;min-width:0"><div style="font-size:11px;color:var(--gray-700);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+(isP?'👤 ':'✉ ')+m.ko+'</div><div style="font-size:10px;color:var(--gray-400)">'+ m.time+'</div></div></div>';
      }).join('');
  } else { hw.innerHTML = ''; }

  // AI 추천 답변
  renderAISuggests(p);
  // 시술 매뉴얼
  renderManual(p);
  // 번역
  renderTrans(p);
}

/* ── AI 추천 답변 ── */
var suggestData = {
  '쌍꺼풀': [
    {tone:'친절', toneBg:'#D1FAE5', toneTc:'#065F46', ko:'안녕하세요! 상담은 무료로 진행하고 있습니다. 매몰법은 ₩400,000~, 절개법은 ₩800,000~ 입니다.', ja:'こんにちは！カウンセリングは無料です。埋没法は₩400,000〜、切開法は₩800,000〜となります。'},
    {tone:'전문적', toneBg:'#EEF2FF', toneTc:'#0D1B3E', ko:'쌍꺼풀 수술은 매몰법과 절개법으로 나뉩니다. 눈의 상태와 원하시는 디자인에 따라 적합한 방법을 카운슬링에서 결정합니다.', ja:'二重手術は埋没法と切開法に分かれます。目の状態と希望のデザインに応じて最適な方法をカウンセリングで決定します。'},
    {tone:'간결', toneBg:'#F3F4F6', toneTc:'#374151', ko:'카운슬링은 무료입니다. 편하신 날짜로 예약해드릴까요?', ja:'カウンセリングは無料です。ご希望の日程でご予約しましょうか？'},
  ],
  '코 성형': [

var selectedSuggestIdx = -1;

function renderAISuggests(p) {
  var suggests = suggestData[p.proc] || suggestData['default'];
  var el = document.getElementById('ai-suggests');
  el.innerHTML = suggests.map(function(s, i){
    return '<div class="ai-suggest-item" id="sug-'+i+'" onclick="selectSuggest('+i+','+(JSON.stringify(s).replace(/'/g,"&#39;"))+')">'
      +'<div class="ai-suggest-tone" style="background:'+s.toneBg+';color:'+s.toneTc+'">'+s.tone+'</div>'
      +'<div class="ai-suggest-text">'+s.ko+'</div>'
      +'<div class="ai-suggest-ja">🇯🇵 '+s.ja+'</div>'
      +'</div>';
  }).join('');
  selectedSuggestIdx = -1;
}

function selectSuggest(idx, s) {
  document.querySelectorAll('.ai-suggest-item').forEach(function(el){ el.classList.remove('selected'); });
  document.getElementById('sug-'+idx).classList.add('selected');
  selectedSuggestIdx = idx;
  // 초안 영역에 자동 입력
  var koEl = document.getElementById('draft-text-ko');
  var jaEl = document.getElementById('draft-text-ja');
  if(koEl) koEl.value = s.ko;
  if(jaEl) jaEl.value = s.ja;
  var draft = document.getElementById('ai-draft');
  if(draft) draft.style.display = 'block';
  showToastInbox('✓ 답변 초안에 적용되었습니다.');
}

function regenSuggests() {
  var el = document.getElementById('ai-suggests');
  el.style.opacity = '.4';
  setTimeout(function(){ el.style.opacity = '1'; showToastInbox('✓ AI 추천 답변이 재생성되었습니다.'); }, 1200);
}

function renderManual(p) {
  var data = manualData[p.proc] || manualData['default'];
  document.getElementById('manual-content').innerHTML = data.map(function(m){
    var badges = m.tags.map(function(t){ return '<span class="manual-badge" style="background:'+t.bg+';color:'+t.tc+'">'+t.label+'</span>'; }).join(' ');
    return '<div class="manual-item">'
      +'<div class="manual-item-title">'+m.icon+' '+m.title+(badges?' '+badges:'')+'</div>'
      +'<div class="manual-item-body">'+m.body+'</div>'
      +'</div>';
  }).join('');
}

function renderTrans(p) {
  var lastMsg = p.msgs[p.msgs.length - 1];
  var el = document.getElementById('trans-content');
  el.innerHTML = '<div class="trans-row">'
    +'<div class="trans-label">🇯🇵 원문 (일본어)</div>'
    +'<div class="trans-box ja">'+lastMsg.ja+'</div>'
    +'<div class="trans-copy" onclick="copyText(\''+lastMsg.ja+'\')">복사 📋</div>'
    +'</div>'
    +'<div class="trans-row">'
    +'<div class="trans-label">🇰🇷 번역 (한국어)</div>'
    +'<div class="trans-box">'+lastMsg.ko+'</div>'
    +'<div class="trans-copy" onclick="copyText(\''+lastMsg.ko+'\')">복사 📋</div>'
    +'</div>';
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(function(){ showToastInbox('✓ 복사되었습니다.'); });
}
