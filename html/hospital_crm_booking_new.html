<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>예약 등록 — Hospital Site OS</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
<link rel="stylesheet" href="../css/common.css"><link rel="stylesheet" href="../css/crm.css">
<style>
.form-wrap{max-width:620px;}
.form-section{background:#fff;border:1px solid var(--gray-200);border-radius:var(--rl);padding:20px 24px;margin-bottom:14px;}
.form-section-title{font-size:13px;font-weight:600;color:var(--navy);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.form-grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.field{margin-bottom:12px;}.field:last-child{margin-bottom:0;}
.f-label{font-size:12px;font-weight:500;color:var(--gray-700);margin-bottom:5px;}
.f-label .req{color:var(--red);margin-left:2px;}
.f-input{width:100%;padding:8px 12px;border:1px solid var(--gray-200);border-radius:var(--r);font-size:13px;font-family:inherit;outline:none;color:var(--gray-700);background:#fff;}
.f-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.08);}
.f-select{width:100%;padding:8px 12px;border:1px solid var(--gray-200);border-radius:var(--r);font-size:13px;font-family:inherit;outline:none;color:var(--gray-700);background:#fff;appearance:auto;}
.f-select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.08);}
.f-textarea{width:100%;padding:8px 12px;border:1px solid var(--gray-200);border-radius:var(--r);font-size:13px;font-family:inherit;outline:none;color:var(--gray-700);background:#fff;resize:vertical;line-height:1.6;}
.f-textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.08);}
.patient-search-wrap{position:relative;}
.patient-result{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid var(--gray-200);border-radius:var(--r);box-shadow:0 4px 16px rgba(0,0,0,.08);z-index:10;margin-top:3px;display:none;}
.patient-item{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;transition:background .1s;border-bottom:1px solid var(--gray-100);}
.patient-item:last-child{border-bottom:none;}
.patient-item:hover{background:var(--gray-50);}
.p-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;}
.p-name{font-size:13px;font-weight:500;color:var(--gray-900);}
.p-meta{font-size:12px;color:var(--gray-400);}
.selected-patient{display:none;align-items:center;gap:10px;padding:10px 12px;background:var(--navy-l);border:1px solid var(--blue);border-radius:var(--r);margin-top:6px;}
.time-slots{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:6px;}
.time-slot{padding:7px 4px;text-align:center;border:1px solid var(--gray-200);border-radius:var(--r);font-size:12px;cursor:pointer;color:var(--gray-600);transition:all .15s;background:#fff;}
.time-slot:hover{border-color:var(--blue);color:var(--blue);}
.time-slot.on{background:var(--navy);border-color:var(--navy);color:#fff;font-weight:500;}
.time-slot.off{background:var(--gray-100);color:var(--gray-300);cursor:not-allowed;pointer-events:none;}
.send-check{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--gray-50);border-radius:var(--r);font-size:12px;color:var(--gray-700);cursor:pointer;}
.send-check input{width:14px;height:14px;accent-color:var(--navy);}
.action-bar{display:flex;align-items:center;justify-content:flex-end;gap:8px;padding:16px 24px;background:#fff;border-top:1px solid var(--gray-200);position:sticky;bottom:0;}
</style>
<script src="../js/gate.js"></script>
</head><body>
<div id="sidebar-mount" data-active="booking"></div>
<main class="main">
  <div class="topbar">
    <div class="topbar-left"><a class="topbar-back" href="hospital_crm_booking.html">← 예약 관리</a><span style="color:var(--gray-300)">/</span><span class="topbar-title">예약 등록</span></div>
  </div>
  <div class="content">
    <div class="form-wrap" id="form-wrap">
      <div class="form-section">
        <div class="form-section-title">👤 환자 정보</div>
        <div class="field">
          <div class="f-label">기존 환자 검색 <span style="font-size:12px;color:var(--gray-400);font-weight:400">이름 또는 연락처로 검색</span></div>
          <div class="patient-search-wrap">
            <input class="f-input" id="patient-search" placeholder="예) 야마다, 090-1234-5678" oninput="searchPatient(this.value)" autocomplete="off">
            <div class="patient-result" id="patient-result"></div>
          </div>
          <div class="selected-patient" id="selected-patient">
            <div class="p-avatar" id="sel-avatar" style="background:#EEF2FF;color:#0D1B3E"></div>
            <div style="flex:1">
              <div style="font-size:13px;font-weight:500;color:var(--navy)" id="sel-name"></div>
              <div style="font-size:12px;color:var(--gray-500)" id="sel-meta"></div>
            </div>
            <button class="btn" style="font-size:12px;padding:3px 9px" onclick="clearPatient()">✕ 해제</button>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;margin:12px 0">
          <div style="flex:1;height:1px;background:var(--gray-100)"></div>
          <span style="font-size:12px;color:var(--gray-400)">또는 신규 환자 직접 입력</span>
          <div style="flex:1;height:1px;background:var(--gray-100)"></div>
        </div>
        <div class="form-grid2">
          <div class="field"><div class="f-label">성명 (일본어)<span class="req">*</span></div><input class="f-input" id="name-ja" placeholder="山田 沙織"></div>
          <div class="field"><div class="f-label">성명 (한국어)</div><input class="f-input" id="name-ko" placeholder="야마다 사오리"></div>
          <div class="field"><div class="f-label">연락처 (LINE ID / 전화)</div><input class="f-input" id="contact" placeholder="@yamada_saori"></div>
          <div class="field"><div class="f-label">접점 채널</div>
            <select class="f-select" id="channel">
              <option value="">선택</option>
              <option value="LINE">LINE</option>
              <option value="Instagram">Instagram</option>
              <option value="walkin">워크인</option>
            </select>
          </div>
        </div>
      </div>

      <div class="form-section">
        <div class="form-section-title">📅 예약 정보</div>
        <div class="form-grid2">
          <div class="field"><div class="f-label">예약 유형<span class="req">*</span></div>
            <select class="f-select" id="type" onchange="updateSlots()">
              <option value="">선택</option>
              <option value="consult">상담 (카운슬링)</option>
              <option value="online">비대면 상담</option>
              <option value="surgery">수술</option>
              <option value="checkup">사후 체크업</option>
              <option value="laser">시술 (레이저 등)</option>
            </select>
          </div>
          <div class="field"><div class="f-label">관심 시술</div>
            <select class="f-select" id="procedure">
              <option value="">선택</option>
            </select>
          </div>
          <div class="field"><div class="f-label">예약 날짜<span class="req">*</span></div>
            <input class="f-input" type="date" id="date" onchange="updateSlots()">
          </div>
          <div class="field"><div class="f-label">담당 의사</div>
            <select class="f-select" id="doctor" onchange="updateSlots()">
              <option value="">배정 없음</option>
            </select>
          </div>
        </div>
        <div class="field">
          <div class="f-label">예약 시간<span class="req">*</span></div>
          <div class="time-slots" id="time-slots"></div>
          <input type="hidden" id="selected-time">
        </div>
      </div>

      <div class="form-section">
        <div class="form-section-title">📝 메모 및 알림</div>
        <div class="field"><div class="f-label">내부 메모</div>
          <textarea class="f-textarea" id="memo" rows="3" placeholder="예) 일본어 전담 스탭 배정 필요 · 이전 상담 내용 참고"></textarea>
        </div>
        <div class="field">
          <div class="f-label">LINE 확정 메시지 발송</div>
          <label class="send-check"><input type="checkbox" id="send-line" checked> 예약 등록 즉시 LINE으로 확정 메시지 자동 발송</label>
          <label class="send-check" style="margin-top:6px"><input type="checkbox" id="send-reminder" checked> 예약 전일 오전 10시 리마인더 발송</label>
        </div>
      </div>
    </div>
  </div>
  <div class="action-bar">
    <a class="btn" href="hospital_crm_booking.html">취소</a>
    <button class="btn btn-primary" onclick="submitBooking()">📅 예약 등록</button>
  </div>
</main>

<script src="../js/auth.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/booking-data.js"></script>
<script>
/* ── 선택지 동적 채우기 ─────────────────────────────────────────── */
window.addEventListener('DOMContentLoaded', function() {
  // 시술 옵션
  var procEl = document.getElementById('procedure');
  PROCEDURES.forEach(function(p) {
    var o = document.createElement('option'); o.textContent = p; procEl.appendChild(o);
  });

  // 의사 옵션
  var doctorEl = document.getElementById('doctor');
  DOCTORS.forEach(function(d) {
    var o = document.createElement('option'); o.value = d; o.textContent = d; doctorEl.appendChild(o);
  });

  // 오늘 날짜 기본값
  var dateEl = document.getElementById('date');
  var today = new Date();
  var yy = today.getFullYear();
  var mm = String(today.getMonth() + 1).padStart(2, '0');
  var dd = String(today.getDate()).padStart(2, '0');
  dateEl.value = yy + '-' + mm + '-' + dd;

  updateSlots();

  // URL 파라미터 (CRM 인박스 연결)
  var params = new URLSearchParams(location.search);
  var name   = params.get('name');
  var nameJa = params.get('nameJa');
  var proc   = params.get('proc');
  var ch     = params.get('ch');
  if (!name) return;

  var nameKoEl = document.getElementById('name-ko');
  var nameJaEl = document.getElementById('name-ja');
  var chEl     = document.getElementById('channel');
  if (nameKoEl) nameKoEl.value = name;
  if (nameJaEl) nameJaEl.value = nameJa || '';
  if (chEl && ch) { var chMap = {'LINE':'LINE','워크인':'walkin'}; chEl.value = chMap[ch] || 'LINE'; }
  if (proc) {
    for (var i = 0; i < procEl.options.length; i++) {
      var optText = procEl.options[i].text.replace(/\s*\(.*\)/, '');
      if (proc.includes(optText) || optText.includes(proc)) { procEl.selectedIndex = i; break; }
    }
  }
  var sp = document.getElementById('selected-patient');
  if (sp) {
    document.getElementById('sel-avatar').textContent = name.slice(0, 2);
    document.getElementById('sel-name').textContent   = name + (nameJa ? ' (' + nameJa + ')' : '');
    document.getElementById('sel-meta').textContent   = (ch || 'LINE') + ' · CRM 인박스에서 연결됨';
    sp.style.display = 'flex';
  }
  document.getElementById('patient-search').value = name;

  var banner = document.createElement('div');
  banner.style.cssText = 'display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--navy-l);border:1px solid var(--blue);border-radius:var(--r);margin-bottom:14px;font-size:12px;color:var(--navy)';
  banner.innerHTML = '<span style="font-size:16px">💬</span><span><strong>' + name + '</strong>님의 CRM 상담에서 연결되었습니다.</span>';
  var formWrap = document.getElementById('form-wrap');
  if (formWrap) formWrap.insertBefore(banner, formWrap.firstChild);
});

/* ── 환자 검색 (ALL_BOOKINGS 기반) ─────────────────────────────── */
function searchPatient(v) {
  var res = document.getElementById('patient-result');
  if (!v.trim()) { res.style.display = 'none'; return; }
  var patients = getPatientsFromBookings();
  var matched = patients.filter(function(p) { return p.name.indexOf(v) !== -1; });
  if (!matched.length) { res.style.display = 'none'; return; }
  res.innerHTML = matched.slice(0, 6).map(function(p) {
    return '<div class="patient-item" onclick=\'selectPatient(' + JSON.stringify(p).replace(/'/g, '&#39;') + ')\'>'
      + '<div class="p-avatar" style="background:' + p.bg + ';color:' + p.tc + '">' + p.init + '</div>'
      + '<div><div class="p-name">' + p.name + '</div>'
      + '<div class="p-meta">' + p.ch + ' · ' + p.proc + '</div></div></div>';
  }).join('');
  res.style.display = 'block';
}

function selectPatient(p) {
  document.getElementById('patient-search').value = p.name;
  document.getElementById('patient-result').style.display = 'none';
  var sp = document.getElementById('selected-patient');
  var av = document.getElementById('sel-avatar');
  av.textContent = p.init; av.style.background = p.bg; av.style.color = p.tc;
  document.getElementById('sel-name').textContent = p.name;
  document.getElementById('sel-meta').textContent = p.ch + ' · ' + p.proc;
  sp.style.display = 'flex';
  document.getElementById('name-ko').value = p.name;
}

function clearPatient() {
  document.getElementById('patient-search').value = '';
  document.getElementById('selected-patient').style.display = 'none';
  document.getElementById('name-ja').value = '';
  document.getElementById('name-ko').value = '';
}

/* ── 타임 슬롯 (예약 현황 기반 자동 비활성화) ───────────────────── */
function updateSlots() {
  var type    = document.getElementById('type').value || 'consult';
  var dateVal = document.getElementById('date').value;
  var doctor  = document.getElementById('doctor').value;
  var times   = SLOT_TIMES[type] || SLOT_TIMES.consult;
  var el      = document.getElementById('time-slots');
  document.getElementById('selected-time').value = '';

  var dateKey = '';
  if (dateVal) {
    var parts = dateVal.split('-');
    dateKey = parseInt(parts[1]) + '/' + parseInt(parts[2]);
  }
  var booked = dateKey ? getBookedTimes(dateKey, doctor || null) : [];

  el.innerHTML = times.map(function(t) {
    var isBooked = booked.indexOf(t) !== -1;
    return '<div class="time-slot' + (isBooked ? ' off' : '') + '"'
      + (isBooked ? '' : ' onclick="selectTime(\'' + t + '\',this)"') + '>'
      + t + (isBooked ? '<br><span style="font-size:9px">예약됨</span>' : '')
      + '</div>';
  }).join('');
}

function selectTime(t, el) {
  document.querySelectorAll('.time-slot').forEach(function(s) { s.classList.remove('on'); });
  el.classList.add('on');
  document.getElementById('selected-time').value = t;
}

/* ── 예약 등록 ───────────────────────────────────────────────────── */
function submitBooking() {
  var nameJa  = document.getElementById('name-ja').value.trim();
  var nameKo  = document.getElementById('name-ko').value.trim();
  var type    = document.getElementById('type').value;
  var dateVal = document.getElementById('date').value;
  var time    = document.getElementById('selected-time').value;
  var proc    = document.getElementById('procedure').value;
  var doctor  = document.getElementById('doctor').value;
  var sendLine = document.getElementById('send-line').checked;

  if (!nameJa)  { alert('환자 성명(일본어)을 입력해주세요.'); return; }
  if (!type)    { alert('예약 유형을 선택해주세요.'); return; }
  if (!dateVal) { alert('예약 날짜를 선택해주세요.'); return; }
  if (!time)    { alert('예약 시간을 선택해주세요.'); return; }

  var parts   = dateVal.split('-');
  var dateKey = parseInt(parts[1]) + '/' + parseInt(parts[2]);
  var typeMap  = {consult:'consult', online:'online', surgery:'auto', checkup:'visit', laser:'auto'};

  saveBooking({
    date:   dateKey,
    time:   time,
    name:   nameKo || nameJa,
    proc:   proc || '미정',
    type:   typeMap[type] || 'consult',
    doctor: doctor || '미배정',
    line:   sendLine,
    status: '확정',
  });

  alert('✓ 예약이 등록되었습니다.\n' + dateKey + ' ' + time + ' — ' + (nameKo || nameJa));
  location.href = 'hospital_crm_booking.html';
}
</script>
</body></html>
