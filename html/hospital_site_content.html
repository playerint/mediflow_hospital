<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>콘텐츠 편집 — Hospital Site OS</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
<link rel="stylesheet" href="../css/common.css">
<link rel="stylesheet" href="../css/site.css">
<style>
/* ── 언어 선택기 ── */
.lang-selector { position:relative; display:inline-block; }
.lang-btn {
  display:flex; align-items:center; gap:6px;
  padding:5px 10px; border-radius:var(--r);
  border:1px solid var(--s200); background:var(--s0);
  font-size:12px; font-weight:500; color:var(--s700);
  cursor:pointer; font-family:inherit; transition:all .15s;
}
.lang-btn:hover { border-color:var(--s300); background:var(--s50); }
.lang-dropdown {
  display:none; position:absolute; top:calc(100% + 4px); right:0;
  background:#fff; border:1px solid var(--s200); border-radius:var(--rl);
  box-shadow:0 4px 16px rgba(0,0,0,.1); z-index:200; min-width:160px; overflow:hidden;
}
.lang-dropdown.open { display:block; }
.lang-option {
  display:flex; align-items:center; gap:8px;
  padding:8px 14px; font-size:12px; color:var(--s700);
  cursor:pointer; transition:background .1s;
}
.lang-option:hover { background:var(--s50); }
.lang-option.active { background:var(--navy-l); color:var(--navy); font-weight:600; }

/* ── 섹션 번호 뱃지 ── */
.sec-num {
  width:22px; height:22px; border-radius:50%;
  background:var(--s200); color:var(--s500);
  font-size:10px; font-weight:700;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.section-item.active .sec-num { background:var(--navy); color:#fff; }

/* ── ZENO v2 상태 칩 (배경 항상 s100, dot만 컬러) ── */
.sec-chip {
  display:inline-flex; align-items:center; gap:4px;
  padding:2px 8px; border-radius:4px;
  font-size:10px; font-weight:600;
  background:var(--s100); color:var(--s700); white-space:nowrap;
}
.sec-chip::before { content:''; width:5px; height:5px; border-radius:50%; flex-shrink:0; }
.chip-red::before   { background:var(--red);  }
.chip-gray::before  { background:var(--s400); }
.chip-light::before { background:var(--s300); }

/* ── 번역 필드 ── */
.trans-block { padding:14px 20px; border-top:1px solid var(--s100); }
.trans-block-label {
  font-size:10px; font-weight:700; color:var(--s400);
  text-transform:uppercase; letter-spacing:.06em; margin-bottom:10px;
  display:flex; align-items:center; justify-content:space-between;
}
.trans-row { display:grid; grid-template-columns:1fr 1fr; gap:0; margin-bottom:10px; }
.trans-col { padding:0 12px 0 0; }
.trans-col + .trans-col { padding:0 0 0 12px; border-left:1px solid var(--s100); }
.trans-sublabel {
  font-size:11px; font-weight:600; color:var(--s400);
  margin-bottom:6px; display:flex; align-items:center; gap:6px;
}
.trans-status-chip {
  display:inline-flex; align-items:center; gap:3px;
  padding:1px 6px; border-radius:3px;
  font-size:9px; font-weight:600; background:var(--s100); color:var(--s500);
}
.ts-none   { color:var(--s400); }
.ts-ai     { color:var(--navy); background:var(--navy-l); }
.ts-review { color:#D97706; background:#FEF3C7; }
.ts-done   { color:#065F46; background:#D1FAE5; }
.trans-orig {
  font-size:13px; color:var(--s700); line-height:1.7;
  padding:10px 12px; background:var(--s50);
  border:1px solid var(--s200); border-radius:var(--r); min-height:80px;
}
.trans-input {
  width:100%; font-size:13px; color:var(--s700); line-height:1.7;
  padding:10px 12px; border:1px solid var(--s200); border-radius:var(--r);
  min-height:80px; resize:vertical; font-family:inherit; outline:none;
}
.trans-input:focus { border-color:var(--navy); box-shadow:0 0 0 3px rgba(13,27,62,.08); }
.trans-actions { display:flex; gap:6px; margin-top:6px; }

/* ── AI 인라인 배너 (ZENO v2) ── */
.ai-inline {
  display:flex; align-items:center; gap:10px;
  border:1px solid var(--s200); border-left:3px solid var(--navy);
  border-radius:8px; padding:10px 14px; background:var(--s0);
  margin:0 20px 14px; font-size:12px; color:var(--s700);
}
.ai-inline-dot { width:6px; height:6px; border-radius:50%; background:var(--navy); flex-shrink:0; animation:pulse 2.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* ── 이미지 없음 경고 배너 ── */
.no-image-banner {
  display:flex; align-items:center; gap:10px;
  border:1px solid #FECACA; border-left:3px solid var(--red);
  border-radius:8px; padding:10px 14px; background:#FEF2F2;
  margin:0 20px 14px; font-size:12px; color:#991B1B;
}

/* ── 리스트 아이템 (Decision/Doctors/FAQ 등) ── */
.list-item {
  background:var(--s0); border:1px solid var(--s200);
  border-radius:var(--r); margin-bottom:8px; overflow:hidden;
}
.list-item-head {
  display:flex; align-items:center; gap:8px;
  padding:10px 14px; background:var(--s50);
  border-bottom:1px solid var(--s100);
  font-size:12px; font-weight:600; color:var(--s700);
}
.list-item-body { padding:12px 14px; }

/* ── 토글 스위치 ── */
.tog-row { display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--s100); }
.tog-row:last-child { border-bottom:none; }
.tog-sw { width:34px; height:19px; border-radius:10px; flex-shrink:0; cursor:pointer; position:relative; transition:background .15s; }
.tog-sw.on  { background:var(--navy); }
.tog-sw.off { background:var(--s300); }
.tog-sw::after { content:''; position:absolute; top:2.5px; width:14px; height:14px; border-radius:50%; background:#fff; transition:left .15s; box-shadow:0 1px 3px rgba(0,0,0,.2); }
.tog-sw.on::after  { left:17px; }
.tog-sw.off::after { left:2.5px; }
.tog-info { flex:1; }
.tog-title { font-size:12px; font-weight:600; color:var(--s900); }
.tog-desc  { font-size:10px; color:var(--s400); margin-top:1px; }

/* ── FAQ Q/A 입력 ── */
.faq-qa { display:flex; flex-direction:column; gap:8px; padding:12px 14px; }
.faq-label { font-size:10px; font-weight:700; color:var(--s400); text-transform:uppercase; letter-spacing:.06em; margin-bottom:4px; }
.faq-input { width:100%; padding:8px 10px; border:1px solid var(--s200); border-radius:var(--r); font-size:13px; font-family:inherit; outline:none; resize:vertical; }
.faq-input:focus { border-color:var(--navy); }

/* ── 이미지 업로드 존 (Cases/Reviews) ── */
.img-upload-req {
  border:2px dashed var(--red); border-radius:var(--r);
  padding:20px; text-align:center; cursor:pointer;
  background:#FEF2F2; transition:all .15s;
}
.img-upload-req:hover { background:#FEE2E2; }
.img-upload-opt {
  border:2px dashed var(--s200); border-radius:var(--r);
  padding:20px; text-align:center; cursor:pointer;
  background:var(--s50); transition:all .15s;
}
.img-upload-opt:hover { border-color:var(--navy); background:var(--navy-l); }

/* ── 섹션 패널 내부 스크롤 ── */
#edit-panel { overflow-y:auto; max-height:calc(100vh - 140px); }

/* ── 채널 카드 ── */
.channel-card {
  background:var(--s0); border:1px solid var(--s200);
  border-radius:var(--rl); padding:14px 16px; margin-bottom:10px;
}
.channel-head { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.channel-icon { font-size:22px; }
.channel-name { font-size:13px; font-weight:600; color:var(--navy); flex:1; }

/* ── 순서 버튼 ── */
.order-btns { display:flex; gap:2px; }
.order-btn { width:24px; height:24px; border:1px solid var(--s200); background:var(--s0); border-radius:4px; cursor:pointer; font-size:11px; display:flex; align-items:center; justify-content:center; }
.order-btn:hover { background:var(--s50); }
</style>
</head>
<body>
<div id="sidebar-mount" data-active="site_content"></div>
<main class="main">

  <!-- 탑바 -->
  <div class="topbar">
    <div class="topbar-left">
      <a class="topbar-back" href="../index.html">← 대시보드</a>
      <span style="color:var(--s300)">/</span>
      <span class="topbar-title">콘텐츠 편집</span>
    </div>
    <div class="topbar-right">
      <!-- 언어 선택기 -->
      <div class="lang-selector" id="lang-selector">
        <button class="lang-btn" id="lang-btn" onclick="toggleLangDropdown()">
          <span id="lang-flag">🇯🇵</span>
          <span id="lang-label">日本語</span>
          <span style="font-size:10px;color:var(--s400)">▾</span>
        </button>
        <div class="lang-dropdown" id="lang-dropdown"></div>
      </div>
      <!-- 번역 전체 현황 -->
      <span id="trans-overall" class="sec-chip chip-gray" style="font-size:11px"></span>
      <button class="btn" onclick="tempSave()">💾 임시 저장</button>
      <a class="btn" href="hospital_site_preview.html">👁 미리보기</a>
      <button class="btn btn-primary" onclick="publishAll()">🚀 발행</button>
    </div>
  </div>

  <div class="content">
    <!-- 탭 바 -->
    <div class="tab-bar">
      <button class="tab active">콘텐츠 편집</button>
      <button class="tab" onclick="location.href='hospital_site_assets.html'">자산 관리</button>
      <button class="tab" onclick="location.href='hospital_site_preview.html'">미리보기 &amp; 게시</button>
    </div>

    <div class="layout-site">
      <!-- 좌측: 섹션 목록 -->
      <div>
        <div class="section-list">
          <div class="section-list-head">섹션 <span style="color:var(--s400);font-weight:400">(10개)</span></div>
          <div id="section-list"></div>
        </div>
        <!-- 컴플라이언스 요약 -->
        <div style="margin-top:12px;background:#fff;border:1px solid var(--s200);border-radius:var(--rl);padding:14px 16px">
          <div style="font-size:11px;font-weight:700;color:var(--s400);text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px">번역 현황</div>
          <div id="trans-summary" style="display:flex;flex-direction:column;gap:6px"></div>
        </div>
      </div>

      <!-- 우측: 편집 패널 -->
      <div class="edit-panel fade" id="edit-panel">
        <div style="padding:40px;text-align:center;color:var(--s400);font-size:13px">섹션을 선택하세요.</div>
      </div>
    </div>
  </div>
</main>

<!-- 이미지 피커 모달 -->
<div id="img-picker-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9100;align-items:center;justify-content:center">
  <div style="background:#fff;border-radius:16px;width:640px;max-width:95vw;max-height:85vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.25)">
    <div style="padding:16px 22px;border-bottom:1px solid var(--s100);display:flex;align-items:center;justify-content:space-between;flex-shrink:0">
      <div style="font-size:14px;font-weight:700;color:var(--navy)">이미지 추가</div>
      <button onclick="closeImgPicker()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--s400)">✕</button>
    </div>
    <div style="padding:14px 22px;border-bottom:1px solid var(--s100);flex-shrink:0">
      <div onclick="triggerImgUpload()" class="img-upload-opt" style="padding:12px">
        <span style="font-size:20px">📁</span>
        <div style="font-size:13px;font-weight:500;color:var(--s700)">새 이미지 업로드</div>
        <div style="font-size:11px;color:var(--s400)">PNG, JPG, WebP · 최대 10MB</div>
        <input type="file" id="img-upload-input" accept="image/*" multiple style="display:none" onchange="handleImgUpload(this)">
      </div>
    </div>
    <div style="padding:12px 22px 0;font-size:10px;font-weight:700;color:var(--s400);text-transform:uppercase;letter-spacing:.06em;flex-shrink:0">자산 라이브러리</div>
    <div id="img-picker-grid" style="overflow-y:auto;padding:10px 22px 16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px"></div>
    <div style="padding:12px 22px;border-top:1px solid var(--s100);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--s50)">
      <span id="img-picker-count" style="font-size:12px;color:var(--s500)">선택 없음</span>
      <div style="display:flex;gap:8px">
        <button class="btn" onclick="closeImgPicker()">취소</button>
        <button class="btn btn-primary" onclick="confirmImgPick()">선택 완료</button>
      </div>
    </div>
  </div>
</div>

<!-- 공통 토스트 / 모달 -->
<script src="../js/gate.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/config.js"></script>
<script src="../js/gemini.js"></script>
<script src="../js/site-data.js"></script>
<script src="../js/mock-data-hospital.js"></script>
<script src="../js/site_content.js"></script>
<script>
/* ── 공통 유틸 ── */
function showToast(msg,type){var e=document.getElementById('__toast');if(e)e.remove();var bg=type==='success'?'#059669':type==='error'?'#DC2626':'#0D1B3E';var t=document.createElement('div');t.id='__toast';t.style.cssText='position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:'+bg+';color:#fff;padding:11px 22px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.2);z-index:9999;white-space:nowrap';t.textContent=msg;document.body.appendChild(t);setTimeout(function(){t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(function(){t.remove();},300);},2500);}
function openModal(title,body,onConfirm,confirmLabel,confirmCls){var e=document.getElementById('__modal');if(e)e.remove();var m=document.createElement('div');m.id='__modal';m.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9000;display:flex;align-items:center;justify-content:center';m.innerHTML='<div style="background:#fff;border-radius:16px;padding:28px 32px;width:100%;max-width:460px;box-shadow:0 20px 60px rgba(0,0,0,.2)"><div style="font-size:15px;font-weight:700;color:#0D1B3E;margin-bottom:14px">'+title+'</div><div style="font-size:13px;color:#374151;line-height:1.7;margin-bottom:20px">'+body+'</div><div style="display:flex;gap:8px;justify-content:flex-end"><button class="btn" onclick="closeModal()">취소</button><button class="btn '+(confirmCls||'btn-primary')+'" id="__modal-ok">'+(confirmLabel||'확인')+'</button></div></div>';m.addEventListener('click',function(e){if(e.target===m)closeModal();});document.body.appendChild(m);document.getElementById('__modal-ok').addEventListener('click',function(){closeModal();if(typeof onConfirm==='function')onConfirm();});}
function closeModal(){var m=document.getElementById('__modal');if(m)m.remove();}
/* 언어 선택기 외부 클릭 닫기 */
document.addEventListener('click', function(e) {
  var sel = document.getElementById('lang-selector');
  if (sel && !sel.contains(e.target)) {
    var dd = document.getElementById('lang-dropdown');
    if (dd) dd.classList.remove('open');
  }
});
</script>
</body>
</html>
